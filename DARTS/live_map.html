<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeroMatrix Tactical Scope</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=B612+Mono:wght@400;700&display=swap');
        :root { color-scheme: dark; }
        body {
            background-color: #040811; color: #e2e8f0; font-family: 'B612 Mono', 'Consolas', 'Courier New', monospace;
            margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
        }

        .hud-top {
            position: absolute; top: 15px; left: 20px; right: 20px; z-index: 50;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; 
        }
        
        .hud-panel {
            background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(4px);
            border: 1px solid #1e293b; border-radius: 4px; padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); pointer-events: auto;
        }

        .title { color: #38bdf8; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; font-size: 1.1em; margin-bottom: 5px; }
        .status { font-size: 0.85em; color: #94a3b8; }
        .online { color: #4ade80; font-weight: bold; }
        .offline { color: #f87171; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; row-gap: 8px; }
        .scale-text { color: #c084fc; font-weight: bold; font-size: 0.9em; letter-spacing: 1px; }

        .btn-action, .map-select {
            background-color: #0ea5e9; color: #fff; border: 1px solid #0369a1; padding: 4px 10px;
            font-size: 0.85em; cursor: pointer; border-radius: 3px;
            font-weight: bold; font-family: monospace; letter-spacing: 0.5px; transition: background-color 0.2s;
        }
        .btn-action:hover { background-color: #38bdf8; }
        .btn-action-alt { background-color: #8b5cf6; border-color: #7c3aed; }
        .btn-action-alt:hover { background-color: #a78bfa; }
        
        .map-select { background-color: #1e293b; color: #e2e8f0; border-color: #334155; outline: none; appearance: none; padding: 4px 25px 4px 10px; }
        .map-select:hover { background-color: #334155; }
        .btn-toggle { background-color: #64748b; border-color: #334155; }
        .btn-toggle.active { background-color: #10b981; border-color: #047857; color: #000; }

        .dual-slider { position: relative; width: 320px; height: 24px; display: flex; align-items: center; flex-shrink: 0; margin: 0 14px; }
        .slider-track { position: absolute; width: 100%; height: 5px; background: #1e293b; border-radius: 999px; z-index: 0; }
        .dual-slider input[type=range] { position: absolute; width: 100%; top: 50%; transform: translateY(-50%); pointer-events: none; background: transparent; appearance: none; -webkit-appearance: none; z-index: 2; margin: 0; }
        .dual-slider input[type=range]::-webkit-slider-thumb { pointer-events: auto; -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #38bdf8; cursor: pointer; box-shadow: 0 0 5px rgba(56, 189, 248, 0.8); }
        .trail-readout { min-width: 280px; width: 280px; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; margin-left: 14px; }

        #db-modal {
            display: none; position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            width: 700px; max-height: 60vh; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px);
            border: 1px solid #38bdf8; border-radius: 6px; z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            flex-direction: column; pointer-events: auto; overflow: hidden;
        }
        .db-header { background: #0369a1; padding: 10px 15px; font-weight: bold; color: white; display: flex; justify-content: space-between; align-items: center; }
        .db-close { cursor: pointer; color: white; font-weight: bold; font-size: 1.2em; }
        .db-close:hover { color: #f87171; }
        .db-content { padding: 15px; overflow-y: auto; }
        .db-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85em; }
        .db-table th { background: #1e293b; padding: 8px; border-bottom: 2px solid #334155; color: #94a3b8; cursor: pointer; user-select: none; }
        .db-table th:hover { color: #38bdf8; }
        .db-table td { padding: 8px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
        .db-table tr:hover { background: rgba(56, 189, 248, 0.1); }
        
        .type-badge { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 0.9em; }
        .type-point { background: #1e3a8a; color: #bae6fd; border: 1px solid #0284c7; }
        .type-line { background: #14532d; color: #86efac; border: 1px solid #166534; }

        #wpt-form {
            display: none; position: absolute; top: 60px; right: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px);
            padding: 15px; border: 1px solid #38bdf8; border-radius: 6px; z-index: 100; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.9); flex-direction: column; gap: 8px; pointer-events: auto;
        }
        .wpt-input { background: #030712; color: #e2e8f0; border: 1px solid #1e293b; font-size: 0.9em; padding: 6px; font-family: monospace; }

        #map-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; display: none; background-color: #040811; pointer-events: none; }
        #radar-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="hud-panel">
            <div class="title">AEROMATRIX TACTICAL SCOPE</div>
            <div class="status">MATRIX LINK: <span id="status-text" class="offline">STANDBY</span></div>
        </div>
        
        <div class="hud-panel controls">
            <span id="radar-scale" class="scale-text">AUTO RNG</span>
            <div style="width: 1px; height: 20px; background: #334155; margin: 0 5px;"></div>
            
            <span style="font-size: 0.8em; color: #64748b; margin-right: 6px;">TRAIL:</span>
            <div class="dual-slider">
                <div class="slider-track"></div>
                <input type="range" id="trail-min" min="0" max="1440" step="1" value="0">
                <input type="range" id="trail-max" min="0" max="1440" step="1" value="1440">
            </div>
            <span id="trail-val" class="scale-text trail-readout" style="color: #38bdf8; text-align:center;">Δ 0m | --:--:-- - --:--:--</span>
            
            <div style="width: 1px; height: 20px; background: #334155; margin: 0 5px;"></div>
            
            <select id="map-style-dropdown" class="map-select" style="display: none;">
                <option value="carto-dark">CARTO DARK</option>
                <option value="carto-light">CARTO LIGHT</option>
                <option value="osm">OSM TOPO</option>
            </select>
            
            <button id="btn-network" class="btn-action btn-toggle">[DATALINK: OFF-GRID]</button>
            <button id="btn-db" class="btn-action btn-action-alt">[DATABASE]</button>
            <button id="btn-add-wpt" class="btn-action">[+ WPT]</button>
            <button id="btn-lock" class="btn-action">[WAYPOINT LOCK]</button>
            <button onclick="openTagConfig()" class="btn-action" title="Ctrl+Shift+T">[TAGS]</button>
            <button onclick="showPerfOverlay=!showPerfOverlay" class="btn-action" title="Ctrl+Shift+P">[PERF]</button>
        </div>
    </div>

    <div id="db-modal">
        <div class="db-header">
            <span>SPATIAL DATABASE MANAGER</span>
            <span class="db-close" id="btn-close-db">X</span>
        </div>
        <div class="db-content">
            <table class="db-table" id="db-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">GEOMETRY ↕</th>
                        <th onclick="sortTable(1)">NAME ↕</th>
                        <th onclick="sortTable(2)">ICON / CLASS ↕</th>
                        <th>COORDINATES (LAT, LON)</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="db-tbody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="wpt-form">
        <div style="font-size: 0.8em; color: #38bdf8; font-weight: bold; margin-bottom: 2px;">INJECT CUSTOM WAYPOINT</div>
        <input type="text" id="wpt-name" class="wpt-input" placeholder="NAME (e.g. HOME)">
        <div style="display: flex; gap: 6px;">
            <input type="text" id="wpt-lat" class="wpt-input" placeholder="LAT (-33.8)" style="width: 80px;">
            <input type="text" id="wpt-lon" class="wpt-input" placeholder="LON (151.2)" style="width: 80px;">
        </div>
        <select id="wpt-type" class="wpt-input" style="width: 100%;">
            <option value="FIX">FIX</option>
            <option value="AIRPORT">AIRPORT</option>
            <option value="VOR">VOR</option>
            <option value="RADAR">RADAR</option>
        </select>
        <div style="display: flex; gap: 6px; margin-top: 4px;">
            <button id="btn-save-wpt" style="flex: 1; background: #10b981; border: none; color: #000; font-weight:bold; cursor: pointer; padding: 6px; border-radius:3px;">SAVE</button>
            <button id="btn-cancel-wpt" style="background: #ef4444; border: none; color: #fff; font-weight:bold; cursor: pointer; padding: 6px 10px; border-radius:3px;">X</button>
        </div>
        <div style="display: flex; gap: 6px; margin-top: 6px; border-top: 1px solid #1e293b; padding-top: 6px;">
            <button onclick="useGPSLocation()" style="flex:1; background:#8b5cf6; border:none; color:#fff; font-weight:bold; cursor:pointer; padding:5px; border-radius:3px; font-size:0.8em;">📍 GPS</button>
            <button onclick="exportWaypoints()" style="flex:1; background:#334155; border:1px solid #475569; color:#e2e8f0; font-weight:bold; cursor:pointer; padding:5px; border-radius:3px; font-size:0.8em;">EXPORT</button>
            <button onclick="importWaypoints()" style="flex:1; background:#334155; border:1px solid #475569; color:#e2e8f0; font-weight:bold; cursor:pointer; padding:5px; border-radius:3px; font-size:0.8em;">IMPORT</button>
        </div>
    </div>

    <div id="map-container"></div>
    <canvas id="radar-canvas"></canvas>

    <script>
        const statusText = document.getElementById('status-text');
        
        let hoveredEntity = null;
        let lockedEntity = null; 
        let secondaryEntity = null; 
        
        let isShiftDown = false; 
        let mouseX = 0, mouseY = 0;
        let dragStartPos = { x: 0, y: 0 };
        
        let lastAircraftList = []; 
        let renderHitboxes = []; 
        const trailHistory = {};
        
        let airspaceGeoJSON = { type: "FeatureCollection", features: [] };

        // --- Configurable data tag fields (Phase 8) ---
        // All available tag fields — mirrors live_grid FIELD_DEFS for full customizability
        const MAP_TAG_FIELD_OPTIONS = [
            {key:'icao',            label:'ICAO',            category:'IDENTIFICATION'},
            {key:'callsign',        label:'CALLSIGN',        category:'IDENTIFICATION'},
            {key:'airline',          label:'AIRLINE',         category:'IDENTIFICATION'},
            {key:'squawk',           label:'SQUAWK',          category:'IDENTIFICATION'},
            {key:'alt',              label:'ALTITUDE',        category:'ALTITUDE'},
            {key:'target_alt',       label:'TARGET ALT',      category:'ALTITUDE'},
            {key:'alt_mcp',          label:'ALT MCP',         category:'ALTITUDE'},
            {key:'alt_fms',          label:'ALT FMS',         category:'ALTITUDE'},
            {key:'radio_height',     label:'RADIO ALT',       category:'ALTITUDE'},
            {key:'vert_rate',        label:'VERT RATE',       category:'KINEMATICS'},
            {key:'speed',            label:'SPEED GS',        category:'KINEMATICS'},
            {key:'tas',              label:'TAS',             category:'KINEMATICS'},
            {key:'ias',              label:'IAS',             category:'KINEMATICS'},
            {key:'mach',             label:'MACH',            category:'KINEMATICS'},
            {key:'heading',          label:'MAG HDG',         category:'KINEMATICS'},
            {key:'display_heading',  label:'DISPLAY HDG',     category:'KINEMATICS'},
            {key:'track',            label:'TRUE TRK',        category:'KINEMATICS'},
            {key:'track_rate',       label:'TRACK RATE',      category:'KINEMATICS'},
            {key:'roll',             label:'BANK INDEX',      category:'KINEMATICS'},
            {key:'inertial_vr',      label:'INERTIAL VR',     category:'KINEMATICS'},
            {key:'selected_heading', label:'SEL HDG',         category:'INTEGRITY'},
            {key:'hdg_spd',          label:'HDG / SPD',       category:'KINEMATICS'},
            {key:'sys_mode',         label:'SYS MODE',        category:'SYSTEM'},
            {key:'baro',             label:'BARO SET',        category:'SYSTEM'},
            {key:'tcas_ra',          label:'TCAS RA',         category:'SAFETY'},
            {key:'hazard',           label:'HAZARD',          category:'SAFETY'},
            {key:'wind',             label:'WIND',            category:'METEO'},
            {key:'sat',              label:'SAT TEMP',        category:'METEO'},
            {key:'humidity',         label:'HUMIDITY',        category:'METEO'},
            {key:'lat',              label:'LATITUDE',        category:'POSITION'},
            {key:'lon',              label:'LONGITUDE',       category:'POSITION'},
            {key:'gnss_qual',        label:'GNSS QUAL',       category:'POSITION'},
            {key:'nac_p',            label:'NACp',            category:'INTEGRITY'},
            {key:'sil',              label:'SIL',             category:'INTEGRITY'},
            {key:'age',              label:'AGE',             category:'SYSTEM'},
            {key:'msg_count',        label:'MSG COUNT',       category:'SURVEILLANCE'},
            {key:'radar_sweep',      label:'RADAR SWEEP',     category:'SURVEILLANCE'},
            {key:'data_age_heading', label:'HDG AGE',         category:'SURVEILLANCE'},
            {key:'data_age_position',label:'POS AGE',         category:'SURVEILLANCE'},
        ];
        const MAP_TAG_FIELD_KEYS = MAP_TAG_FIELD_OPTIONS.map(f => f.key);
        const MAP_TAG_DEFAULTS = ['icao','callsign','squawk','alt','hdg_spd'];
        // Independent localStorage key — separate from grid config
        const MAP_TAG_STORAGE_KEY = 'dart_map_tag_config';
        let mapTagFields = (() => {
            try {
                const raw = localStorage.getItem(MAP_TAG_STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed.fields)) return parsed.fields.filter(k => MAP_TAG_FIELD_KEYS.includes(k));
                }
            } catch(e) {}
            return [...MAP_TAG_DEFAULTS];
        })();
        // Global tag-box toggle — persisted
        let mapTagShowBox = (() => {
            try {
                const raw = localStorage.getItem(MAP_TAG_STORAGE_KEY);
                if (raw) { const parsed = JSON.parse(raw); if (typeof parsed.showBox === 'boolean') return parsed.showBox; }
            } catch(e) {}
            return true;
        })();
        function saveMapTagConfig() {
            localStorage.setItem(MAP_TAG_STORAGE_KEY, JSON.stringify({ fields: mapTagFields, showBox: mapTagShowBox }));
        }

        // --- Altitude color legend (Phase 5) ---
        const ALT_COLOR_LEGEND = [
            { label: 'GROUND', color: 'rgb(249,115,22)' },
            { label: '< FL100', color: 'rgb(56,189,248)' },
            { label: 'FL100-200', color: 'rgb(52,211,153)' },
            { label: 'FL200-300', color: 'rgb(168,85,247)' },
            { label: 'FL300-400', color: 'rgb(251,191,36)' },
            { label: '≥ FL400', color: 'rgb(244,114,182)' },
        ];

        // --- Performance / latency counters (Phase 4) ---
        let perfCounters = { frames: 0, lastWsTime: 0, wsLatency: 0, renderMs: 0, aircraftCount: 0 };
        let showPerfOverlay = false;

        const rCanvas = document.getElementById('radar-canvas');
        const mapContainer = document.getElementById('map-container');
        const rCtx = rCanvas.getContext('2d');
        const scaleText = document.getElementById('radar-scale');
        
        const REF_LAT = -33.9461; 
        const REF_LON = 151.1772;
        const COS_LAT = Math.cos(REF_LAT * Math.PI / 180); 

        // Slider Logic
        const trailMin = document.getElementById('trail-min');
        const trailMax = document.getElementById('trail-max');
        const trailVal = document.getElementById('trail-val');
        const TRAIL_WINDOW_MAX_MINUTES = 1440;

        function formatDuration(minutesValue) {
            const totalSeconds = Math.max(0, Math.round(minutesValue * 60));
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const parts = [];
            if (days > 0) parts.push(`${days}d`);
            if (hours > 0 || parts.length > 0) parts.push(`${String(hours).padStart(2, '0')}h`);
            if (minutes > 0 || parts.length > 0) parts.push(`${String(minutes).padStart(2, '0')}m`);
            parts.push(`${seconds}s`);
            return parts.join(' ');
        }

        function updateSliderLabels() {
            let minSlider = parseInt(trailMin.value);
            let maxSlider = parseInt(trailMax.value);
            if (minSlider > maxSlider) { trailMin.value = maxSlider; minSlider = maxSlider; }
            const now = Date.now();
            const maxAgeMs = (TRAIL_WINDOW_MAX_MINUTES - minSlider) * 60000;
            const minAgeMs = (TRAIL_WINDOW_MAX_MINUTES - maxSlider) * 60000;
            const fmtOpts = { hour: '2-digit', minute:'2-digit', second: '2-digit', hour12: false };
            const spanMinutes = (maxSlider - minSlider);
            trailVal.innerText = `Δ ${formatDuration(spanMinutes)} | ${new Date(now - maxAgeMs).toLocaleTimeString([], fmtOpts)} - ${new Date(now - minAgeMs).toLocaleTimeString([], fmtOpts)}`;
        }
        trailMin.addEventListener('input', updateSliderLabels);
        trailMax.addEventListener('input', updateSliderLabels);
        setInterval(updateSliderLabels, 60000); updateSliderLabels();

        // Shift Ruler Logic
        window.addEventListener('keydown', e => { if (e.key === 'Shift') isShiftDown = true; });
        window.addEventListener('keyup', e => { if (e.key === 'Shift') isShiftDown = false; });

        // Database Manager Logic
        let sortCol = -1; let sortAsc = true;
        const dbModal = document.getElementById('db-modal');
        
        document.getElementById('btn-db').addEventListener('click', () => { populateDbTable(); dbModal.style.display = 'flex'; });
        document.getElementById('btn-close-db').addEventListener('click', () => dbModal.style.display = 'none');

        window.sortTable = function(colIdx) {
            if (sortCol === colIdx) { sortAsc = !sortAsc; }
            else { sortCol = colIdx; sortAsc = true; }
            
            airspaceGeoJSON.features.sort((a, b) => {
                let valA = '', valB = '';
                const pA = a.properties || {}; const gA = a.geometry || {};
                const pB = b.properties || {}; const gB = b.geometry || {};
                
                if (colIdx === 0) { valA = gA.type || ''; valB = gB.type || ''; }
                else if (colIdx === 1) { valA = pA.name || ''; valB = pB.name || ''; }
                else if (colIdx === 2) { valA = pA.icon || pA.type || ''; valB = pB.icon || pB.type || ''; }
                
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            populateDbTable();
        };

        function populateDbTable() {
            const tbody = document.getElementById('db-tbody');
            tbody.innerHTML = '';
            
            if (!airspaceGeoJSON.features || airspaceGeoJSON.features.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No Spatial Data Available in Memory.</td></tr>`;
                return;
            }

            airspaceGeoJSON.features.forEach((feature, idx) => {
                const props = feature.properties || {};
                const geom = feature.geometry || {};
                
                let coordStr = 'N/A';
                if (geom.type === 'Point' && geom.coordinates) {
                    coordStr = `[${geom.coordinates[1].toFixed(4)}, ${geom.coordinates[0].toFixed(4)}]`;
                } else if (geom.type === 'LineString' && geom.coordinates) {
                    coordStr = `Vector (${geom.coordinates.length} Nodes)`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="type-badge ${geom.type === 'Point' ? 'type-point' : 'type-line'}">${geom.type.toUpperCase()}</span></td>
                    <td style="font-weight:bold; color:#38bdf8;">${props.name || 'UNNAMED'}</td>
                    <td>${props.icon || props.type || 'DEFAULT'}</td>
                    <td style="color:#94a3b8;">${coordStr}</td>
                    <td><button style="background:#ef4444; color:white; border:none; padding:2px 8px; cursor:pointer;" onclick="deleteFeature(${idx})">DEL</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.deleteFeature = function(idx) {
            if(confirm("Purge geometry feature from database?")) {
                if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ action: "delete_feature", index: idx })); }
                airspaceGeoJSON.features.splice(idx, 1);
                populateDbTable();
            }
        };

        // Inject Waypoint Logic
        document.getElementById('btn-add-wpt').addEventListener('click', () => document.getElementById('wpt-form').style.display = 'flex');
        document.getElementById('btn-cancel-wpt').addEventListener('click', () => document.getElementById('wpt-form').style.display = 'none');
        
        document.getElementById('btn-save-wpt').addEventListener('click', () => {
            const Waypoint_Name = document.getElementById('wpt-name').value.trim();
            const LAT = parseFloat(document.getElementById('wpt-lat').value);
            const LONG = parseFloat(document.getElementById('wpt-lon').value);
            const type = document.getElementById('wpt-type').value.trim().toUpperCase() || 'FIX';
            
            if (Waypoint_Name && !isNaN(LAT) && !isNaN(LONG)) {
                const newWpt = { Waypoint_Name, LAT, LONG, type };
                if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ action: "add_wpt", waypoint: newWpt })); }
                
                document.getElementById('wpt-name').value = '';
                document.getElementById('wpt-lat').value = '';
                document.getElementById('wpt-lon').value = '';
                document.getElementById('wpt-type').value = '';
                document.getElementById('wpt-form').style.display = 'none';
            }
        });

        // --- Viewport State Engine ---
        let networkMode = 'OFF-GRID'; 
        let leafMap = null;
        let isAutoView = true;
        let manualZoomDeg = 0.5; let panX = 0; let panY = 0;
        let isDragging = false; let lastMouse = { x: 0, y: 0 };

        if (typeof L !== 'undefined') {
            leafMap = L.map('map-container', { zoomControl: false, attributionControl: false, zoomSnap: 0, zoomAnimation: false }).setView([REF_LAT, REF_LON], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(leafMap);
        }

        document.getElementById('btn-network').addEventListener('click', () => {
            if (networkMode === 'OFF-GRID') {
                networkMode = 'ONLINE';
                document.getElementById('btn-network').innerText = '[DATALINK: LIVE MAP]';
                document.getElementById('btn-network').className = 'btn-action btn-toggle active';
                document.getElementById('map-style-dropdown').style.display = 'block';
                mapContainer.style.display = 'block';
                
                rCanvas.style.pointerEvents = 'auto'; 
                mapContainer.style.pointerEvents = 'none';
                rCanvas.style.boxShadow = 'none'; 
                
                const R_MIN = Math.min(window.innerWidth / 2, window.innerHeight / 2);
                const ppd = R_MIN / manualZoomDeg;
                const centerLon = REF_LON - (panX / (COS_LAT * ppd));
                const centerLat = REF_LAT + (panY / ppd);

                                'wind': () => (p.wind && p.wind !== '----') ? p.wind : '----',
                                'sat': () => (p.sat && p.sat !== '----') ? p.sat + '°C' : '----',
                                'humidity': () => (p.humidity && p.humidity !== '----') ? p.humidity + '%' : '----',
                                'lat': () => (p.lat && p.lat !== '----') ? parseFloat(p.lat).toFixed(4) : '----',
                                'lon': () => (p.lon && p.lon !== '----') ? parseFloat(p.lon).toFixed(4) : '----',
                                'gnss_qual': () => (p.gnss_qual && p.gnss_qual !== '----') ? p.gnss_qual : '----',
                                'nac_p': () => (p.nac_p && p.nac_p !== '----') ? 'NACp:' + p.nac_p : '----',
                                'sil': () => (p.sil && p.sil !== '----') ? 'SIL:' + p.sil : '----',
                                'age': () => (p.age !== undefined && p.age !== '----') ? p.age + 's' : '----',
                                'msg_count': () => (p.msg_count !== undefined && p.msg_count !== '----') ? p.msg_count : '----',
                                'radar_sweep': () => (p.radar_sweep && p.radar_sweep !== '----') ? p.radar_sweep + 's' : '----',
                                'data_age_heading': () => (p.data_age_heading && p.data_age_heading !== '----') ? p.data_age_heading + 's' : '----',
                                'data_age_position': () => (p.data_age_position && p.data_age_position !== '----') ? p.data_age_position + 's' : '----',
                            };
                            
                            const lines = mapTagFields.map(f => (tagFieldRenderers[f] || (() => '----'))());
                            
                            // Dynamic box sizing: no box if zero fields
                            if (lines.length === 0) return;
                            
                            // Measure content to dynamically size box
                            rCtx.font = isSelected ? "bold 11px 'B612 Mono', 'Consolas', monospace" : "11px 'B612 Mono', 'Consolas', monospace";
                            const lineHeight = 11.5;
                            const padX = 6, padY = 7;
                            let maxTextW = 0;
                            lines.forEach(line => { const w = rCtx.measureText(line).width; if (w > maxTextW) maxTextW = w; });
                            const tagW = Math.ceil(maxTextW + padX * 2 + 2);
                            const tagH = Math.ceil(lines.length * lineHeight + padY * 2);

                            let tagX = pt.x + 12; let tagY = pt.y - (tagH/2);
                            let attempts = 0; let isDisplaced = false; let angle = 0; let radius = 45;

                            while (occupiedRects.some(r => tagX < r.x + r.w + 4 && tagX + tagW > r.x - 4 && tagY < r.y + r.h + 4 && tagY + tagH > r.y - 4) && attempts < 15) {
                                isDisplaced = true; angle += Math.PI / 4; radius += 6;
                                tagX = pt.x + Math.cos(angle) * radius; tagY = pt.y + Math.sin(angle) * radius;
                                attempts++;
                            }
                            occupiedRects.push({x: tagX, y: tagY, w: tagW, h: tagH});

                            if (isDimmed) return; 

                            if (isDisplaced) {
                                rCtx.beginPath(); rCtx.moveTo(pt.x, pt.y); rCtx.lineTo(tagX + (tagX > pt.x ? 0 : tagW), tagY + (tagH/2));
                                rCtx.strokeStyle = isSelected ? '#38bdf8' : 'rgba(148, 163, 184, 0.4)'; rCtx.lineWidth = 1; rCtx.stroke();
                            }

                            // Tag box background — conditional on global toggle
                            if (mapTagShowBox) {
                                rCtx.fillStyle = isSelected ? 'rgba(3, 7, 18, 0.95)' : 'rgba(3, 7, 18, 0.7)';
                                rCtx.strokeStyle = isSelected ? '#38bdf8' : 'rgba(51, 65, 85, 0.8)';
                                rCtx.lineWidth = 1;
                                rCtx.beginPath(); rCtx.roundRect(tagX, tagY, tagW, tagH, 4); rCtx.fill(); rCtx.stroke();
                            }
                            
                            rCtx.font = isSelected ? "bold 11px 'B612 Mono', 'Consolas', monospace" : "11px 'B612 Mono', 'Consolas', monospace";
                            const textColor = isSelected ? '#ffffff' : (p.is_coasting ? 'rgba(148, 163, 184, 0.9)' : '#38bdf8');
                            
                            lines.forEach((line, idx) => {
                                if (idx === mapTagFields.indexOf('squawk') && (['7500', '7600', '7700'].includes(p.squawk) || hasActiveRa)) { rCtx.fillStyle = '#ef4444'; } 
                                else { rCtx.fillStyle = textColor; }
                                rCtx.fillText(line, tagX + padX, tagY + padY + 7 + (idx * lineHeight));
                            });
                        }
                    }
                });

                if (lockedEntity && secondaryEntity) {
                    const e1 = entityCache[lockedEntity];
                    const e2 = entityCache[secondaryEntity];
                    
                    if (e1 && e2) {
                        const pt1 = getCanvasPoint(e1.lat, e1.lon, R_CX, R_CY, ppd);
                        const pt2 = getCanvasPoint(e2.lat, e2.lon, R_CX, R_CY, ppd);
                        
                        const dLat = e2.lat - e1.lat;
                        const dLon = (e2.lon - e1.lon) * COS_LAT;
                        const horizNm = Math.sqrt(dLat*dLat + dLon*dLon) * 60;
                        const horizFt = horizNm * 6076.12;
                        
                        let dAlt = 0; let slantFt = horizFt; let altStr = "ΔV: ----";
                        let alt1 = e1.alt === 'GROUND' ? 0 : parseInt(e1.alt);
                        let alt2 = e2.alt === 'GROUND' ? 0 : parseInt(e2.alt);
                        
                        if (!isNaN(alt1) && !isNaN(alt2)) {
                            dAlt = Math.abs(alt2 - alt1);
                            slantFt = Math.sqrt(horizFt*horizFt + dAlt*dAlt);
                            altStr = `ΔV: ${dAlt.toLocaleString()} FT`;
                        }
                        
                        rCtx.beginPath(); rCtx.moveTo(pt1.x, pt1.y); rCtx.lineTo(pt2.x, pt2.y);
                        rCtx.strokeStyle = '#c084fc'; rCtx.lineWidth = 2; rCtx.setLineDash([5, 5]); rCtx.stroke(); rCtx.setLineDash([]);
                        
                        const midX = (pt1.x + pt2.x) / 2; const midY = (pt1.y + pt2.y) / 2;
                        
                        rCtx.fillStyle = 'rgba(15, 23, 42, 0.95)'; rCtx.fillRect(midX - 60, midY - 25, 135, 58);
                        rCtx.strokeStyle = '#c084fc'; rCtx.strokeRect(midX - 60, midY - 25, 135, 58);
                        rCtx.fillStyle = '#c084fc'; rCtx.font = "bold 11px 'B612 Mono', monospace";
                        rCtx.fillText(`HD: ${horizNm.toFixed(2)} NM`, midX - 54, midY - 10);
                        rCtx.fillText(altStr, midX - 54, midY + 2);
                        rCtx.fillText(`SD: ${slantFt.toLocaleString(undefined, {maximumFractionDigits:0})} FT`, midX - 54, midY + 14);
                        
                        // Hold-alt confidence indicator (Phase 6)
                        const conf = computeHoldAltConfidence(e1, e2);
                        rCtx.fillStyle = conf.color;
                        rCtx.font = "9px 'B612 Mono', monospace";
                        const confText = conf.ageDelta !== null ? `${conf.confidence} Δt:${conf.ageDelta.toFixed(1)}s` : conf.confidence;
                        rCtx.fillText(`⬤ ${confText}`, midX - 54, midY + 27);
                    }
                }

                if (isShiftDown && (!lockedEntity || !secondaryEntity)) {
                    let startLat = REF_LAT, startLon = REF_LON;
                    let startPt = getCanvasPoint(startLat, startLon, R_CX, R_CY, ppd);
                    
                    if (lockedEntity && entityCache[lockedEntity]) {
                        startLat = entityCache[lockedEntity].lat; startLon = entityCache[lockedEntity].lon; 
                        startPt = getCanvasPoint(startLat, startLon, R_CX, R_CY, ppd);
                    }
                    
                    let targetLon = REF_LON + ((mouseX - R_CX) / (COS_LAT * ppd));
                    let targetLat = REF_LAT - ((mouseY - R_CY) / ppd);
                    if (networkMode === 'ONLINE' && leafMap) {
                        const ll = leafMap.containerPointToLatLng([mouseX, mouseY]);
                        targetLat = ll.lat; targetLon = ll.lng;
                    }
                    
                    let dLat = targetLat - startLat; let dLon = (targetLon - startLon) * COS_LAT;
                    let distNm = Math.sqrt(dLat*dLat + dLon*dLon) * 60;
                    let brg = (Math.atan2(dLon, dLat) * 180 / Math.PI);
                    if (brg < 0) brg += 360;
                    
                    rCtx.beginPath(); rCtx.moveTo(startPt.x, startPt.y); rCtx.lineTo(mouseX, mouseY);
                    rCtx.strokeStyle = '#f43f5e'; rCtx.lineWidth = 1.5; rCtx.setLineDash([4, 4]); rCtx.stroke(); rCtx.setLineDash([]);
                    
                    rCtx.fillStyle = 'rgba(15, 23, 42, 0.9)'; rCtx.fillRect(mouseX + 12, mouseY - 25, 115, 20);
                    rCtx.strokeStyle = '#f43f5e'; rCtx.strokeRect(mouseX + 12, mouseY - 25, 115, 20);
                    rCtx.fillStyle = '#f43f5e'; rCtx.font = "bold 11px monospace";
                    rCtx.fillText(`${distNm.toFixed(1)} NM | ${Math.round(brg)}°`, mouseX + 16, mouseY - 11);
                }

            } catch (radarError) { console.warn("Radar Render Suppressed:", radarError); }
        }

        // Ingestion loop
        const ws = new WebSocket('ws://localhost:8765');
        ws.onopen = () => { statusText.innerText = 'ONLINE - STREAMING RAMPED'; statusText.className = 'online'; };
        ws.onclose = () => { statusText.innerText = 'OFFLINE - CONSOLE DETACHED'; statusText.className = 'offline'; };

        ws.onmessage = (event) => {
            try {
                const wsReceiveTime = Date.now();
                perfCounters.wsLatency = wsReceiveTime - perfCounters.lastWsTime;
                perfCounters.lastWsTime = wsReceiveTime;
                
                const parsedData = JSON.parse(event.data);
                if (parsedData.airspace) airspaceGeoJSON = parsedData.airspace;
                
                let aircraftList = Array.isArray(parsedData.airframes) ? parsedData.airframes : (Array.isArray(parsedData) ? parsedData : []);
                lastAircraftList = aircraftList; 
                const now = Date.now();

                aircraftList.forEach(p => {
                    if (p.lat && p.lon && p.lat !== '----' && p.lon !== '----') {
                        if (!trailHistory[p.icao]) trailHistory[p.icao] = { path: [], lastUpdate: now };
                        const latF = parseFloat(p.lat); const lonF = parseFloat(p.lon);
                        const historyObj = trailHistory[p.icao];
                        historyObj.lastUpdate = now;
                        
                        const history = historyObj.path;
                        if (history.length === 0 || history[history.length - 1].lat !== latF || history[history.length - 1].lon !== lonF) {
                            history.push({ lat: latF, lon: lonF, time: now, alt: p.alt });
                        }
                        if (history.length > 10000) history.shift();
                    }
                });

                Object.keys(trailHistory).forEach(icao => {
                    if (!aircraftList.some(p => p.icao === icao)) {
                        if (now - trailHistory[icao].lastUpdate > 86400000) delete trailHistory[icao];
                    }
                });

            } catch (err) { console.warn("Soft catch on Matrix Loop:", err); }
        };

        // Dedicated pulse
        function pulse() {
            const t0 = performance.now();
            renderTacticalScope(lastAircraftList);
            perfCounters.renderMs = (performance.now() - t0).toFixed(1);
            perfCounters.aircraftCount = lastAircraftList.length;
            
            // Draw altitude color legend (bottom-left)
            const lX = 20, lY = rCanvas.height - 20 - (ALT_COLOR_LEGEND.length * 18);
            rCtx.font = "10px 'B612 Mono', monospace";
            ALT_COLOR_LEGEND.forEach((entry, i) => {
                rCtx.fillStyle = entry.color;
                rCtx.fillRect(lX, lY + i * 18, 12, 12);

                rCtx.fillStyle = '#94a3b8';
                rCtx.font = "10px 'B612 Mono', monospace";
                rCtx.fillText(`RENDER: ${perfCounters.renderMs}ms`, pX + 8, pY + 16);
                rCtx.fillText(`WS LAT: ${perfCounters.wsLatency}ms`, pX + 8, pY + 30);
                rCtx.fillText(`TARGETS: ${perfCounters.aircraftCount}`, pX + 8, pY + 44);
                rCtx.fillText(`FRAMES: ${perfCounters.frames}`, pX + 8, pY + 58);

            perfCounters.frames++;
            
            requestAnimationFrame(pulse);
        }
        pulse();

        // --- Tag Configurator UI (Phase 8) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'T' && e.shiftKey && e.ctrlKey) {

        function openTagConfig() {
            let existing = document.getElementById('tag-config-modal');
            if (existing) { existing.remove(); return; }
            
            const modal = document.createElement('div');
            modal.id = 'tag-config-modal';
            modal.style.cssText = 'position:absolute;top:80px;right:20px;width:300px;max-height:calc(100vh - 120px);background:rgba(15,23,42,0.95);border:1px solid #38bdf8;border-radius:6px;z-index:200;padding:15px;pointer-events:auto;font-size:0.85em;display:flex;flex-direction:column;overflow:hidden;';
            
            function renderModal() {
                let html = '<div style="color:#38bdf8;font-weight:bold;margin-bottom:8px;">TAG FIELD CONFIG <span style="float:right;cursor:pointer;" onclick="document.getElementById(\'tag-config-modal\').remove()">✕</span></div>';
                
                // Global box toggle
                html += `<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1e293b;margin-bottom:8px;cursor:pointer;color:#e2e8f0;">
                    <input type="checkbox" id="tag-box-toggle" ${mapTagShowBox ? 'checked' : ''} onchange="mapTagShowBox=this.checked;saveMapTagConfig();">
                    <span>SHOW TAG BOX</span></label>`;
                
                // Search
                html += '<input type="text" id="tag-search" placeholder="Search fields..." style="width:100%;background:#030712;color:#e2e8f0;border:1px solid #1e293b;padding:5px 8px;font-family:monospace;font-size:0.9em;border-radius:3px;margin-bottom:8px;box-sizing:border-box;">';
                
                // Active fields (reorderable)
                html += '<div style="color:#94a3b8;font-size:0.75em;margin-bottom:4px;">ACTIVE FIELDS (drag or ▲▼ to reorder):</div>';
                html += '<div id="tag-active-list" style="max-height:140px;overflow-y:auto;border:1px solid #1e293b;border-radius:3px;margin-bottom:8px;">';
                mapTagFields.forEach((key, idx) => {
                    const def = MAP_TAG_FIELD_OPTIONS.find(f => f.key === key);
                    const label = def ? def.label : key.toUpperCase();
                    html += `<div draggable="true" data-key="${key}" style="display:flex;align-items:center;gap:4px;padding:3px 6px;background:rgba(14,165,233,0.1);border-bottom:1px solid #0f172a;cursor:grab;color:#38bdf8;">
                        <span style="flex:1;font-size:0.9em;">${label}</span>
                        <button onclick="moveTagField('${key}',-1)" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:0.8em;padding:0 2px;">▲</button>
                        <button onclick="moveTagField('${key}',1)" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:0.8em;padding:0 2px;">▼</button>
                        <button onclick="toggleTagField('${key}',false)" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.9em;padding:0 2px;">✕</button>
                    </div>`;
                });
                html += '</div>';
                
                // Available fields (grouped by category)
                html += '<div style="color:#94a3b8;font-size:0.75em;margin-bottom:4px;">AVAILABLE FIELDS:</div>';
                html += '<div id="tag-avail-list" style="flex:1;overflow-y:auto;border:1px solid #1e293b;border-radius:3px;min-height:80px;">';
                const categories = [...new Set(MAP_TAG_FIELD_OPTIONS.map(f => f.category))];
                categories.forEach(cat => {
                    const fields = MAP_TAG_FIELD_OPTIONS.filter(f => f.category === cat);
                    html += `<div style="padding:3px 6px;color:#64748b;font-size:0.75em;font-weight:bold;background:#0f172a;">${cat}</div>`;
                    fields.forEach(def => {
                        const isActive = mapTagFields.includes(def.key);
                        html += `<div class="tag-avail-item" data-key="${def.key}" style="display:flex;align-items:center;gap:6px;padding:3px 6px;cursor:pointer;color:${isActive ? '#334155' : '#e2e8f0'};" onclick="toggleTagField('${def.key}',${!isActive})">
                            <span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border:1px solid ${isActive ? '#38bdf8' : '#475569'};border-radius:2px;background:${isActive ? '#38bdf8' : 'transparent'};color:#000;font-size:0.7em;font-weight:bold;">${isActive ? '✓' : ''}</span>
                            <span style="flex:1;font-size:0.9em;">${def.label}</span>
                        </div>`;
                    });
                });
                html += '</div>';
                
                // Bottom buttons
                html += '<div style="margin-top:8px;display:flex;gap:6px;">';
                html += '<button onclick="mapTagFields=[...MAP_TAG_DEFAULTS];saveMapTagConfig();rerenderTagConfig();" style="flex:1;background:#64748b;border:none;color:#fff;padding:4px;border-radius:3px;cursor:pointer;font-size:0.85em;">RESET</button>';
                html += '<button onclick="document.getElementById(\'tag-config-modal\').remove();" style="flex:1;background:#0ea5e9;border:none;color:#fff;padding:4px;border-radius:3px;cursor:pointer;font-size:0.85em;">CLOSE</button>';
                html += '</div>';
                
                modal.innerHTML = html;
                
                // Attach search filter
                setTimeout(() => {
                    const searchInput = document.getElementById('tag-search');
                    if (searchInput) {
                        searchInput.addEventListener('input', () => {
                            const q = searchInput.value.toLowerCase();
                            document.querySelectorAll('.tag-avail-item').forEach(el => {
                                const key = el.dataset.key;
                                const def = MAP_TAG_FIELD_OPTIONS.find(f => f.key === key);
                                const match = !q || (def && (def.label.toLowerCase().includes(q) || def.key.includes(q) || def.category.toLowerCase().includes(q)));
                                el.style.display = match ? 'flex' : 'none';
                            });
                        });
                    }
                    
                    // Drag-and-drop reorder for active list
                    const activeList = document.getElementById('tag-active-list');
                    if (activeList) {
                        let dragSrcKey = null;
                        activeList.addEventListener('dragstart', e => { dragSrcKey = e.target.dataset.key; e.dataTransfer.effectAllowed = 'move'; });
                        activeList.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
                        activeList.addEventListener('drop', e => {
                            e.preventDefault();
                            const targetEl = e.target.closest('[data-key]');
                            if (!targetEl || !dragSrcKey) return;
                            const dstKey = targetEl.dataset.key;
                            if (dragSrcKey === dstKey) return;
                            const srcIdx = mapTagFields.indexOf(dragSrcKey);
                            const dstIdx = mapTagFields.indexOf(dstKey);
                            if (srcIdx === -1 || dstIdx === -1) return;
                            mapTagFields.splice(srcIdx, 1);
                            mapTagFields.splice(dstIdx, 0, dragSrcKey);
                            saveMapTagConfig();
                            rerenderTagConfig();
                        });
                    }
                }, 0);
            }
            
            renderModal();
            document.body.appendChild(modal);
        }
        
        window.rerenderTagConfig = function() {
            const modal = document.getElementById('tag-config-modal');
            if (modal) { modal.remove(); openTagConfig(); }
        };

        window.moveTagField = function(key, dir) {
            const idx = mapTagFields.indexOf(key);
            if (idx === -1) return;
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= mapTagFields.length) return;
            mapTagFields.splice(idx, 1);
            mapTagFields.splice(newIdx, 0, key);
            saveMapTagConfig();
            rerenderTagConfig();
        };

        function toggleTagField(field, enabled) {
            if (enabled && !mapTagFields.includes(field)) {
                mapTagFields.push(field);
            } else if (!enabled) {
                mapTagFields = mapTagFields.filter(f => f !== field);
            }
            saveMapTagConfig();
            rerenderTagConfig();
        }

        // --- Waypoint GPS + Import/Export (Phase 7) ---
        function useGPSLocation() {
            if (!navigator.geolocation) { alert('Geolocation not supported'); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('wpt-lat').value = pos.coords.latitude.toFixed(6);
                    document.getElementById('wpt-lon').value = pos.coords.longitude.toFixed(6);
                },
                (err) => { alert('GPS error: ' + err.message); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function exportWaypoints() {
            const features = airspaceGeoJSON.features || [];
            const blob = new Blob([JSON.stringify(features, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'waypoints_export.json';
            a.click();
        }

        function importWaypoints() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const features = JSON.parse(evt.target.result);
                        const arr = Array.isArray(features) ? features : (features.features || []);
                        arr.forEach(f => {
                            if (f.type === 'Feature' && f.geometry && f.properties) {
                                ws.send(JSON.stringify({
                                    action: 'add_wpt',
                                    waypoint: {
                                        Waypoint_Name: f.properties.name || 'IMPORTED',
                                        LAT: f.geometry.coordinates[1],
                                        LONG: f.geometry.coordinates[0],
                                        type: f.properties.icon || 'FIX'
                                    }
                                }));
                            }
                        });
                    } catch (err) { alert('Import error: ' + err.message); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // --- Hold-Alt Tool: Time-aligned measurement with confidence (Phase 6) ---
        // Validity states: HIGH (green) = both entities fresh (<5s delta or waypoint),
        // MED (amber) = delta 5-10s, LOW (red) = >10s or no latency data, STALE (grey) = >30s age
        function computeHoldAltConfidence(e1, e2) {
            if (!e1 || !e2) return { confidence: 'NONE', ageDelta: null, color: '#94a3b8' };
            
            // Waypoints are always "fresh" (static ground truth) — treat as age 0
            const isWpt1 = e1._latency === null && e1.alt === 'GROUND';
            const isWpt2 = e2._latency === null && e2.alt === 'GROUND';
            
            const age1 = isWpt1 ? 0 : (e1._latency ? e1._latency.state_age : null);
            const age2 = isWpt2 ? 0 : (e2._latency ? e2._latency.state_age : null);
            
            // If both are waypoints, always HIGH
            if (isWpt1 && isWpt2) return { confidence: 'HIGH', ageDelta: 0, color: '#4ade80' };
            
            // If either aircraft has no latency data (never received position update)
            if (age1 === null || age2 === null) return { confidence: 'LOW', ageDelta: null, color: '#ef4444' };
            
            // Check for stale data (>30s since last update)
            const maxAge = Math.max(age1, age2);
            if (maxAge > 30) return { confidence: 'STALE', ageDelta: Math.abs(age1 - age2), color: '#94a3b8' };
            
            // Compute time alignment delta
            const ageDelta = Math.abs(age1 - age2);
            if (ageDelta > 10) return { confidence: 'LOW', ageDelta, color: '#ef4444' };
            if (ageDelta > 5) return { confidence: 'MED', ageDelta, color: '#fbbf24' };
            return { confidence: 'HIGH', ageDelta, color: '#4ade80' };
        }

    </script>
