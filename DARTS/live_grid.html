<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DART-B Live Grid</title>
    <!-- B612 Mono: designed by Airbus/ENAC for aircraft cockpit displays.
         Highly legible at small sizes, truly monospaced, technical/aeronautical feel.
         Loaded from Google Fonts. Falls back to Courier New if unavailable (offline /
         CSP-restricted environments). Self-host the woff2 files from
         https://fonts.google.com/specimen/B612+Mono to eliminate the dependency. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=B612+Mono:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        body {
            background-color: #0b0b0d; color: #e2e8f0; font-family: 'B612 Mono', 'Courier New', monospace;
            margin: 12px; display: flex; flex-direction: column; height: 97vh; overflow: hidden;
        }
        h2 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3em; margin-top: 5px; flex-shrink: 0; }
        .status { font-size: 0.82em; margin-bottom: 12px; color: #94a3b8; flex-shrink: 0; display: flex; justify-content: space-between; align-items: flex-end;}
        .online { color: #4ade80; font-weight: bold; }
        .offline { color: #f87171; font-weight: bold; }
        .db-counter { color: #c084fc; font-weight: bold; letter-spacing: 0.5px; }

        .table-container { flex: 1; overflow: auto; margin-bottom: 10px; border-radius: 4px; border: 1px solid #1e293b; }
        table { border-collapse: collapse; background-color: #0d1117; }
        th, td { padding: 8px 4px; text-align: left; font-size: 0.75em; vertical-align: middle; color: #f1f5f9; white-space: nowrap; font-family: 'B612 Mono', 'Courier New', monospace; }
        th { background-color: #030712; color: #38bdf8; font-weight: bold; border-bottom: 2px solid #1e293b; text-transform: uppercase; position: sticky; top: 0; z-index: 10; cursor: default; overflow: visible; box-sizing: border-box; padding-right: 10px; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: #7dd3fc; }
        th.sort-active { color: #f97316 !important; }
        tr { border-bottom: 1px solid #1e293b; transition: background-color 0.1s ease; }
        tr:hover { background-color: #1e293b; }

        /* Column resize handle — absolutely positioned at right edge of each header cell */
        .resize-handle {
            position: absolute; right: 0; top: 0; bottom: 0; width: 6px;
            cursor: col-resize; background: transparent; z-index: 15;
        }
        .resize-handle:hover, .resize-handle.col-resizing { background: rgba(56,189,248,0.45); }

        .origin-cell { font-size: 0.65em; color: #8b5cf6; text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 0px !important; border-bottom: none !important; font-weight: normal; }
        .header-cell { padding-top: 4px !important; }

        .row-ident { background-color: rgba(234, 179, 8, 0.4) !important; transition: background-color 0.2s ease; }
        .row-emergency { background-color: rgba(220, 38, 38, 0.35) !important; font-weight: bold; }
        .row-coasting { opacity: 0.35; transition: opacity 2.5s ease-in-out; }

        .icao { color: #fbbf24; font-weight: bold; }
        .airline-cell { color: #22d3ee; font-weight: bold; text-transform: uppercase;}
        .intent { color: #c084fc; font-weight: bold; }
        .discrete-cell { color: #38bdf8; font-weight: bold; }
        .decode-tag { display: inline-block; margin-top: 3px; padding: 1px 5px; border: 1px solid #7c3aed; border-radius: 999px; color: #c084fc; font-size: 0.9em; letter-spacing: 0.4px; }
        .baro-cell { color: #f43f5e; font-weight: bold; }
        .radar-cell { color: #a855f7; font-weight: bold; }
        .sensor-cell { color: #2dd4bf; }
        .gnss-cell { color: #10b981; font-weight: bold; }
        .cpr-cell { color: #fb923c; font-weight: bold; }
        .squawk-cell { font-weight: bold; color: #f472b6; }
        .empty-datum { color: #64748b; }
        .status-clean { color: #4ade80; }
        .status-ra { color: #ef4444; font-weight: bold; animation: text-flash 0.5s infinite alternate; }

        .instrument-wrapper { display: flex; align-items: center; gap: 8px; transition: opacity 0.4s ease; }
        .val-text { min-width: 32px; display: inline-block; }
        .dial-core { position: relative; width: 24px; height: 24px; border: 1.5px solid #475569; border-radius: 50%; background-color: #0b0b0d; flex-shrink: 0; box-shadow: inset 0 0 4px rgba(0,0,0,0.6); }
        .pointer-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .bank-dial::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background-color: #38bdf8; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .bank-pointer, .hdg-pointer { transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); transform-origin: 50% 50%; }
        .bank-pointer::before { content: ''; position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background-color: #06b6d4; box-shadow: 0 0 3px rgba(6, 182, 212, 0.8); transform: translateY(-50%); }
        .hdg-pointer::before { content: ''; position: absolute; top: 2px; left: 50%; width: 6px; height: 6px; background-color: #f97316; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 4px rgba(249, 115, 22, 0.7); }

        @keyframes text-flash { from { opacity: 1; } to { opacity: 0.4; } }

        /* --- Column manager button --- */
        .col-mgr-btn {
            background: #1e293b; border: 1px solid #334155; color: #38bdf8; font-family: inherit;
            font-size: 0.78em; padding: 4px 10px; border-radius: 3px; cursor: pointer; letter-spacing: 0.5px;
            text-transform: uppercase; transition: background 0.15s, border-color 0.15s;
        }
        .col-mgr-btn:hover { background: #334155; border-color: #38bdf8; }

        /* --- Column manager modal overlay --- */
        .col-mgr-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.72); backdrop-filter: blur(2px);
            align-items: flex-start; justify-content: flex-end; padding: 12px;
        }
        .col-mgr-overlay.open { display: flex; }
        .col-mgr-panel {
            background: #0d1117; border: 1px solid #334155; border-radius: 6px;
            width: 680px; max-height: calc(100vh - 24px); display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        .col-mgr-header {
            display: flex; align-items: center; gap: 10px; padding: 12px 14px;
            border-bottom: 1px solid #1e293b; flex-shrink: 0;
        }
        .col-mgr-title { color: #38bdf8; font-size: 0.9em; font-weight: bold; letter-spacing: 1px; flex: 1; }
        .col-mgr-close {
            background: none; border: none; color: #64748b; font-size: 1.2em; cursor: pointer; padding: 2px 6px;
            border-radius: 3px; line-height: 1;
        }
        .col-mgr-close:hover { color: #f87171; background: rgba(248,113,113,0.1); }
        .col-mgr-body {
            display: flex; gap: 0; flex: 1; min-height: 0; overflow: hidden;
        }
        .col-mgr-section {
            flex: 1; display: flex; flex-direction: column; min-height: 0;
            padding: 10px 12px;
        }
        .col-mgr-section + .col-mgr-section { border-left: 1px solid #1e293b; }
        .col-section-title {
            color: #64748b; font-size: 0.65em; letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 8px; font-weight: bold; flex-shrink: 0;
        }
        .col-search {
            background: #0b0b0d; border: 1px solid #334155; color: #e2e8f0; font-family: inherit;
            font-size: 0.72em; padding: 5px 8px; border-radius: 3px; width: 100%; box-sizing: border-box;
            margin-bottom: 8px; flex-shrink: 0;
        }
        .col-search::placeholder { color: #475569; }
        .col-search:focus { outline: none; border-color: #38bdf8; }

        /* Active columns list (left panel) */
        .active-col-list {
            list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1;
        }
        .active-col-item {
            display: flex; align-items: center; gap: 6px; padding: 5px 4px;
            border: 1px solid transparent; border-radius: 3px; cursor: default;
            user-select: none; font-size: 0.75em;
        }
        .active-col-item.drag-over { border-color: #38bdf8; background: rgba(56,189,248,0.1); }
        .active-col-item[draggable] { cursor: grab; }
        .active-col-item:active { cursor: grabbing; }
        .drag-handle { color: #475569; font-size: 0.85em; flex-shrink: 0; cursor: grab; }
        .col-item-label { flex: 1; color: #e2e8f0; }
        .col-item-cat { font-size: 0.65em; color: #64748b; flex-shrink: 0; }
        .col-item-btn {
            background: none; border: 1px solid #334155; color: #94a3b8; font-family: inherit;
            font-size: 0.7em; padding: 1px 5px; border-radius: 2px; cursor: pointer; flex-shrink: 0;
        }
        .col-item-btn:hover { border-color: #64748b; color: #e2e8f0; }
        .col-item-btn.danger:hover { border-color: #f87171; color: #f87171; }
        .col-item-btn.up-btn, .col-item-btn.dn-btn { font-size: 0.85em; padding: 0 4px; }

        /* Available fields list (right panel) */
        .avail-col-list { overflow-y: auto; flex: 1; }
        .avail-cat-group { margin-bottom: 10px; }
        .avail-cat-label {
            color: #475569; font-size: 0.62em; letter-spacing: 0.8px; text-transform: uppercase;
            margin-bottom: 4px; padding: 2px 4px; border-left: 2px solid #334155;
        }
        .avail-col-item {
            display: flex; align-items: center; gap: 8px; padding: 4px 4px;
            border-radius: 3px; font-size: 0.73em; cursor: default;
        }
        .avail-col-item.hidden-field { opacity: 0.5; }
        .field-toggle {
            width: 14px; height: 14px; border: 1px solid #475569; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; font-size: 0.7em; transition: all 0.1s;
        }
        .field-toggle.active { background: #38bdf8; border-color: #38bdf8; color: #000; }
        .field-toggle:hover { border-color: #94a3b8; }
        .avail-field-label { flex: 1; color: #cbd5e1; }
        .avail-field-src { font-size: 0.65em; color: #475569; }

        /* Footer */
        .col-mgr-footer {
            border-top: 1px solid #1e293b; padding: 10px 14px;
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .sort-config { display: flex; align-items: center; gap: 6px; flex: 1; font-size: 0.75em; color: #94a3b8; }
        .sort-select, .sort-dir-btn {
            background: #0b0b0d; border: 1px solid #334155; color: #e2e8f0; font-family: inherit;
            font-size: 0.95em; padding: 3px 6px; border-radius: 3px; cursor: pointer;
        }
        .sort-select:focus, .sort-dir-btn:focus { outline: none; border-color: #38bdf8; }
        .sort-dir-btn { min-width: 60px; }
        .col-mgr-actions { display: flex; gap: 8px; }
        .mgr-btn {
            background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-family: inherit;
            font-size: 0.75em; padding: 5px 12px; border-radius: 3px; cursor: pointer; letter-spacing: 0.3px;
        }
        .mgr-btn:hover { border-color: #64748b; color: #e2e8f0; }
        .mgr-btn.primary { border-color: #38bdf8; color: #38bdf8; }
        .mgr-btn.primary:hover { background: rgba(56,189,248,0.1); }
    </style>
</head>
<body>

    <h2>DART-B Live Grid</h2>
    <div class="status">
        <span>DATASTREAM CORE LINK: <span id="status-text" class="offline">STANDBY</span></span>
        <div style="display:flex;gap:12px;align-items:center;">
            <span class="db-counter">LEDGER DB: <span id="ledger-count-val">0</span> ROWS</span>
            <button class="col-mgr-btn" id="open-col-mgr-btn">⚙ COLUMNS</button>
        </div>
    </div>

    <div class="table-container">
        <table id="main-table">
            <thead id="main-thead"></thead>
            <tbody id="aircraft-table-body">
                <tr id="cold-start-row"><td colspan="34" style="text-align:center;color:#10b981;font-weight:bold;">System cold-start. Synchronizing register array...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Column Manager Modal -->
    <div class="col-mgr-overlay" id="col-mgr-overlay">
        <div class="col-mgr-panel">
            <div class="col-mgr-header">
                <span class="col-mgr-title">⚙ COLUMN MANAGER</span>
                <button class="col-mgr-close" id="close-col-mgr-btn" title="Close">✕</button>
            </div>
            <div class="col-mgr-body">
                <!-- Left: active columns in order -->
                <div class="col-mgr-section">
                    <div class="col-section-title">ACTIVE COLUMNS — drag to reorder</div>
                    <ul class="active-col-list" id="active-col-list"></ul>
                </div>
                <!-- Right: all available fields with toggle -->
                <div class="col-mgr-section">
                    <div class="col-section-title">ALL AVAILABLE FIELDS</div>
                    <input class="col-search" id="col-search" type="text" placeholder="Search fields...">
                    <div class="avail-col-list" id="avail-col-list"></div>
                </div>
            </div>
            <div class="col-mgr-footer">
                <div class="sort-config">
                    <span>SORT:</span>
                    <select class="sort-select" id="sort-key-select">
                        <option value="">— none —</option>
                    </select>
                    <button class="sort-dir-btn" id="sort-dir-btn">▲ ASC</button>
                </div>
                <div class="col-mgr-actions">
                    <button class="mgr-btn" id="reset-widths-btn">RESET WIDTHS</button>
                    <button class="mgr-btn" id="reset-config-btn">RESET DEFAULTS</button>
                    <button class="mgr-btn primary" id="apply-config-btn">APPLY ✓</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    // FIELD REGISTRY
    // Single source of truth for all available grid columns.
    // 'key' must match the aircraft state dict key, except for
    // virtual keys (sys_mode, ias_mach, track_info, latlon, meteo)
    // which are computed from their constituent raw fields.
    // ============================================================
    const FIELD_DEFS = [
        // --- Identification ---
        { key:'icao',             label:'ICAO',           category:'IDENTIFICATION', source:'PI Parity',       sortable:true,  defaultVisible:true  },
        { key:'callsign',         label:'CALLSIGN',       category:'IDENTIFICATION', source:'DF17 TC:1-4',     sortable:true,  defaultVisible:true  },
        { key:'airline',          label:'AIRLINE',        category:'IDENTIFICATION', source:'DB Lookup',       sortable:true,  defaultVisible:true  },
        { key:'squawk',           label:'SQUAWK',         category:'IDENTIFICATION', source:'DF11 / DF21',     sortable:true,  defaultVisible:true  },
        { key:'air_ground',       label:'AIR/GROUND',     category:'IDENTIFICATION', source:'DF17 TC / Mode S',sortable:true,  defaultVisible:false },
        // --- Altitude ---
        { key:'alt',              label:'ALTITUDE',       category:'ALTITUDE',       source:'DF17 / DF20',     sortable:true,  defaultVisible:true,  unit:'ft'    },
        { key:'target_alt',       label:'TARGET ALT',     category:'ALTITUDE',       source:'BDS 4,0',         sortable:false, defaultVisible:true  },
        // --- Kinematics ---
        { key:'vert_rate',        label:'VERT RATE',      category:'KINEMATICS',     source:'BDS 6,0',         sortable:true,  defaultVisible:true,  unit:'ft/min'  },
        // --- System / Modes (ordered here so default columns match original layout) ---
        { key:'sys_mode',         label:'SYS MODE',       category:'SYSTEM',         source:'BDS 4,0/6,2/4,8', sortable:false, defaultVisible:true              },
        { key:'baro',             label:'BARO SET',       category:'SYSTEM',         source:'BDS 4,0',         sortable:false, defaultVisible:true,  unit:'hPa'   },
        // --- Kinematics (speeds + heading) ---
        { key:'speed',            label:'SPEED GS',       category:'KINEMATICS',     source:'BDS 5,0 / TC19',  sortable:true,  defaultVisible:true,  unit:'kt'    },
        { key:'tas',              label:'TAS',            category:'KINEMATICS',     source:'BDS 5,0',         sortable:true,  defaultVisible:true,  unit:'kt'    },
        { key:'ias_mach',         label:'IAS / MACH',     category:'KINEMATICS',     source:'BDS 6,0',         sortable:false, defaultVisible:true              },
        { key:'ias',              label:'IAS',            category:'KINEMATICS',     source:'BDS 6,0',         sortable:true,  defaultVisible:false, unit:'kt'    },
        { key:'mach',             label:'MACH',           category:'KINEMATICS',     source:'BDS 6,0',         sortable:true,  defaultVisible:false             },
        { key:'heading',          label:'MAG HDG',        category:'KINEMATICS',     source:'BDS 6,0',         sortable:true,  defaultVisible:false, unit:'deg'   },
        { key:'display_heading',  label:'DISPLAY HDG',    category:'KINEMATICS',     source:'Arbitrated',      sortable:true,  defaultVisible:true,  unit:'deg'   },
        { key:'track_info',       label:'TRUE TRK / RATE',category:'KINEMATICS',     source:'BDS 5,0',         sortable:false, defaultVisible:true              },
        { key:'track',            label:'TRUE TRK',       category:'KINEMATICS',     source:'BDS 5,0',         sortable:true,  defaultVisible:false, unit:'deg'   },
        { key:'track_rate',       label:'TRACK RATE',     category:'KINEMATICS',     source:'BDS 5,0',         sortable:true,  defaultVisible:false, unit:'deg/s' },
        { key:'roll',             label:'BANK INDEX',     category:'KINEMATICS',     source:'BDS 5,0',         sortable:true,  defaultVisible:true,  unit:'deg'   },
        // --- Extended kinematics (opt-in) ---
        { key:'inertial_vr',      label:'INERTIAL VR',    category:'KINEMATICS',     source:'BDS 6,0',         sortable:true,  defaultVisible:false, unit:'ft/min'  },
        // --- Additional system fields ---
        { key:'discretes',        label:'DISCRETES',      category:'SYSTEM',         source:'BDS 6,2 / TC29',  sortable:false, defaultVisible:false             },
        { key:'capability_summary',label:'CAPABILITIES',  category:'SYSTEM',         source:'BDS 1,7',         sortable:false, defaultVisible:false             },
        { key:'last_bds_hit',     label:'LAST BDS HIT',   category:'SYSTEM',         source:'Decoded',         sortable:false, defaultVisible:false             },
        { key:'supported_bds',    label:'SUPP BDS REGS',  category:'SYSTEM',         source:'BDS 1,7',         sortable:false, defaultVisible:false             },
        // --- Safety ---
        { key:'tcas_ra',          label:'TCAS RA',        category:'SAFETY',         source:'BDS 3,0',         sortable:false, defaultVisible:true              },
        { key:'hazard',           label:'HAZARD',         category:'SAFETY',         source:'BDS 4,4/4,5',     sortable:false, defaultVisible:false             },
        { key:'wind_shear_level', label:'WS LEVEL',       category:'SAFETY',         source:'BDS 4,5',         sortable:true,  defaultVisible:false             },
        { key:'microburst_level', label:'MB LEVEL',       category:'SAFETY',         source:'BDS 4,5',         sortable:true,  defaultVisible:false             },
        { key:'icing_level',      label:'ICING LEVEL',    category:'SAFETY',         source:'BDS 4,5',         sortable:true,  defaultVisible:false             },
        { key:'wake_vortex_level',label:'WV LEVEL',       category:'SAFETY',         source:'BDS 4,5',         sortable:true,  defaultVisible:false             },
        { key:'threat_icao',      label:'RA THREAT ICAO', category:'SAFETY',         source:'BDS 3,0',         sortable:true,  defaultVisible:false             },
        { key:'threat_range_nm',  label:'RA THREAT RNG',  category:'SAFETY',         source:'BDS 3,0',         sortable:true,  defaultVisible:false, unit:'NM'  },
        { key:'threat_bearing_deg',label:'RA THREAT BRG', category:'SAFETY',         source:'BDS 3,0',         sortable:true,  defaultVisible:false, unit:'deg' },
        // --- Intent / trajectory ---
        { key:'intent_next_wp',   label:'INTENT WP',      category:'INTENT',         source:'BDS 4,1',         sortable:true,  defaultVisible:false             },
        { key:'intent_wp_lat',    label:'INTENT LAT',     category:'INTENT',         source:'BDS 4,2',         sortable:true,  defaultVisible:false, unit:'deg' },
        { key:'intent_wp_lon',    label:'INTENT LON',     category:'INTENT',         source:'BDS 4,2',         sortable:true,  defaultVisible:false, unit:'deg' },
        { key:'intent_wp_cross_alt',label:'INTENT X ALT', category:'INTENT',         source:'BDS 4,2',         sortable:true,  defaultVisible:false, unit:'ft'  },
        { key:'intent_bearing',   label:'INTENT BRG',     category:'INTENT',         source:'BDS 4,3',         sortable:true,  defaultVisible:false, unit:'deg' },
        { key:'intent_time_to_go',label:'INTENT TTG',     category:'INTENT',         source:'BDS 4,3',         sortable:true,  defaultVisible:false, unit:'min' },
        { key:'intent_dist_to_go',label:'INTENT DTG',     category:'INTENT',         source:'BDS 4,3',         sortable:true,  defaultVisible:false, unit:'NM'  },
        // --- Communications ---
        { key:'vhf1_freq_mhz',    label:'VHF1',           category:'COMMS',          source:'BDS 4,8',         sortable:true,  defaultVisible:false, unit:'MHz' },
        { key:'vhf2_freq_mhz',    label:'VHF2',           category:'COMMS',          source:'BDS 4,8',         sortable:true,  defaultVisible:false, unit:'MHz' },
        { key:'vhf3_freq_mhz',    label:'VHF3',           category:'COMMS',          source:'BDS 4,8',         sortable:true,  defaultVisible:false, unit:'MHz' },
        { key:'vhf1_audio',       label:'VHF1 AUDIO',     category:'COMMS',          source:'BDS 4,8',         sortable:false, defaultVisible:false             },
        { key:'vhf2_audio',       label:'VHF2 AUDIO',     category:'COMMS',          source:'BDS 4,8',         sortable:false, defaultVisible:false             },
        { key:'vhf3_audio',       label:'VHF3 AUDIO',     category:'COMMS',          source:'BDS 4,8',         sortable:false, defaultVisible:false             },
        { key:'vhf_guard_audio',  label:'121.5 AUDIO',    category:'COMMS',          source:'BDS 4,8',         sortable:false, defaultVisible:false             },
        // --- Air-referenced vector ---
        { key:'air_vector_heading',label:'AIRV HDG',      category:'KINEMATICS',     source:'BDS 5,3',         sortable:true,  defaultVisible:false, unit:'deg' },
        { key:'air_vector_ias',   label:'AIRV IAS',       category:'KINEMATICS',     source:'BDS 5,3',         sortable:true,  defaultVisible:false, unit:'kt'  },
        { key:'air_vector_mach',  label:'AIRV MACH',      category:'KINEMATICS',     source:'BDS 5,3',         sortable:true,  defaultVisible:false             },
        { key:'air_vector_tas',   label:'AIRV TAS',       category:'KINEMATICS',     source:'BDS 5,3',         sortable:true,  defaultVisible:false, unit:'kt'  },
        { key:'air_vector_vr',    label:'AIRV VR',        category:'KINEMATICS',     source:'BDS 5,3',         sortable:true,  defaultVisible:false, unit:'ft/min' },
        // --- Quasi-static parameter monitor ---
        { key:'qsp_mcp_alt_change',label:'QSP MCP ALT',   category:'SYSTEM',         source:'BDS 5,F',         sortable:true,  defaultVisible:false             },
        { key:'qsp_next_wp_change',label:'QSP NEXT WP',   category:'SYSTEM',         source:'BDS 5,F',         sortable:true,  defaultVisible:false             },

    // Build lookup map
    const FIELD_MAP = {};
    FIELD_DEFS.forEach(f => FIELD_MAP[f.key] = f);

    // ============================================================
    // FIELD DEFAULT WIDTHS
    // Content-aware minimum column widths (px). Applied when no manual
    // width is stored. Sized to fit the widest expected value + header.
    // ============================================================
    const FIELD_DEFAULT_WIDTHS = {
        icao: 72,   callsign: 88,    airline: 148,  squawk: 66, air_ground: 96,
        alt: 96,    target_alt: 114, vert_rate: 104,
        sys_mode: 158, baro: 92,     speed: 74,     tas: 66,
        ias_mach: 134, ias: 64,      mach: 68,      heading: 104,

        discretes: 104, capability_summary: 106, last_bds_hit: 84, supported_bds: 148,
        tcas_ra: 104, hazard: 108, wind_shear_level: 84, microburst_level: 84, icing_level: 92, wake_vortex_level: 84, threat_icao: 118, threat_range_nm: 108, threat_bearing_deg: 108,
        intent_next_wp: 104, intent_wp_lat: 94, intent_wp_lon: 94, intent_wp_cross_alt: 104, intent_bearing: 92, intent_time_to_go: 92, intent_dist_to_go: 92,
        vhf1_freq_mhz: 88, vhf2_freq_mhz: 88, vhf3_freq_mhz: 88, vhf1_audio: 104, vhf2_audio: 104, vhf3_audio: 104, vhf_guard_audio: 108,
        air_vector_heading: 92, air_vector_ias: 86, air_vector_mach: 92, air_vector_tas: 86, air_vector_vr: 96,
        qsp_mcp_alt_change: 112, qsp_next_wp_change: 112, qsp_fms_vmode_change: 124, qsp_vhf_change: 92, qsp_meteo_change: 102, qsp_fms_alt_change: 102, qsp_baro_change: 96,
        radar_sweep: 106, gnss_qual: 106,
        latlon: 164, lat: 90, lon: 94,
        meteo: 148, wind: 92, sat: 72, humidity: 72, meteo_source: 92,
        selected_heading: 88, selected_alt_source: 108, autopilot_mode: 94, vnav_mode: 88, alt_hold_mode: 88, approach_mode: 88, lnav_mode: 88, tcas_operational: 88, nac_p: 72, sil: 56, nic_baro: 76,
        radio_height: 84,
        rssi_dbfs: 72,
        age: 56, first_seen: 78,
    };

    // ============================================================
    // CONFIG MANAGEMENT — localStorage persistence
    // Persists: columns (order + visibility), sortKey, sortDir,
    // and columnWidths (per-key pixel widths for manual resize).
    // ============================================================
    const STORAGE_KEY = 'dart_grid_config_v1';

    function getDefaultConfig() {
        return {
            columns: FIELD_DEFS.filter(f => f.defaultVisible).map(f => f.key),
            sortKey: null,
            sortDir: 'asc',
            columnWidths: {}   // key → manual pixel width; empty = use FIELD_DEFAULT_WIDTHS
        };
    }

    function loadConfig() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const cfg = JSON.parse(raw);
                // Validate: ensure all stored column keys exist in FIELD_MAP
                if (Array.isArray(cfg.columns)) {
                    cfg.columns = cfg.columns.filter(k => FIELD_MAP[k]);
                    if (cfg.columns.length === 0) return getDefaultConfig();
                }
                // Back-fill columnWidths for configs saved before this feature
                if (!cfg.columnWidths || typeof cfg.columnWidths !== 'object') cfg.columnWidths = {};
                return cfg;
            }
        } catch(e) { console.warn('[DART-B] Failed to load saved grid configuration, using defaults instead. Clear browser storage if the issue persists.', e); }
        return getDefaultConfig();
    }

    function saveConfig(cfg) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); }
        catch(e) { console.warn('[DART-B] Failed to save grid configuration. This may indicate insufficient storage quota.', e); }
    }

    // Active config (drives table rendering)
    let activeConfig = loadConfig();

    // Working copy used while column manager is open
    let tempConfig = null;

    // ============================================================
    // HELPERS
    // ============================================================

    /** Returns true for values that represent "no data" in aircraft state. */
    function isEmptyValue(val) {
        return val === null || val === undefined || val === '----';
    }

    /**
     * Formats a column label with its optional unit suffix.
     * Used in table headers and the available-fields list.
     */
    function formatLabelWithUnit(label, unit) {
        return unit ? `${label} (${unit})` : label;
    }

    // ============================================================
    // TABLE HEADER RENDERING
    // ============================================================
    function rebuildTableHeader() {
        const thead = document.getElementById('main-thead');
        thead.innerHTML = '';

        // Row 1: source labels (origin cells)
        const srcRow = document.createElement('tr');
        activeConfig.columns.forEach(key => {
            const th = document.createElement('th');
            th.className = 'origin-cell';
            th.textContent = (FIELD_MAP[key] && FIELD_MAP[key].source) || '';
            // Apply matching min-width to keep origin row aligned with header row
            const w = (activeConfig.columnWidths && activeConfig.columnWidths[key]) || FIELD_DEFAULT_WIDTHS[key] || 80;
            th.style.minWidth = w + 'px';
            srcRow.appendChild(th);
        });
        thead.appendChild(srcRow);

        // Row 2: column header labels (with sort indicators and resize handles)
        const hdrRow = document.createElement('tr');
        activeConfig.columns.forEach(key => {
            const def = FIELD_MAP[key];
            const th = document.createElement('th');
            th.className = 'header-cell';
            th.dataset.key = key;

            // Apply content-aware or manually-set column width
            const w = (activeConfig.columnWidths && activeConfig.columnWidths[key]) || FIELD_DEFAULT_WIDTHS[key] || 80;
            th.style.minWidth = w + 'px';
            th.style.width = w + 'px';

            let label = formatLabelWithUnit(def ? def.label : key.toUpperCase(), def ? def.unit : null);

            // Sort indicator
            if (def && def.sortable) {
                th.classList.add('sortable');
                if (activeConfig.sortKey === key) {
                    th.classList.add('sort-active');
                    label += (activeConfig.sortDir === 'asc') ? ' ▲' : ' ▼';
                }
                th.addEventListener('click', () => handleHeaderSort(key));
            }
            th.textContent = label;

            // Draggable resize handle — positioned at right edge of th
            const rh = document.createElement('div');
            rh.className = 'resize-handle';
            rh.title = 'Drag to resize column';
            rh.addEventListener('mousedown', (e) => {
                _colKey = key;
                _colStartX = e.clientX;
                _colStartW = th.getBoundingClientRect().width;
                _colResizing = true;
                rh.classList.add('col-resizing');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
                e.stopPropagation();
            });
            th.appendChild(rh);

            hdrRow.appendChild(th);
        });
        thead.appendChild(hdrRow);
    }

    function handleHeaderSort(key) {
        if (activeConfig.sortKey === key) {
            activeConfig.sortDir = activeConfig.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            activeConfig.sortKey = key;
            activeConfig.sortDir = 'asc';
        }
        saveConfig(activeConfig);
        rebuildTableHeader();
    }

    // ============================================================
    // CELL RENDERERS
    // ============================================================
    const EM = `<span class="empty-datum">----</span>`;
    const HAZARD_LEVEL_LABELS = ['NIL', 'LIGHT', 'MOD', 'SEV'];

    function renderCell(key, plane) {
        switch(key) {
            case 'icao':
                return { html: plane.icao || EM, cls: 'icao' };
            case 'callsign':
                return { html: (plane.callsign && plane.callsign !== '----') ? plane.callsign : EM };
            case 'airline':
                return { html: (plane.airline && plane.airline !== '----') ? plane.airline : EM, cls: 'airline-cell' };
            case 'squawk':
                return { html: (plane.squawk && plane.squawk !== '----') ? plane.squawk : EM, cls: 'squawk-cell' };
            case 'air_ground':
                return { html: (plane.air_ground && plane.air_ground !== '----') ? plane.air_ground : EM };
            case 'alt': {
                let html = EM;
                if (plane.alt === 'GROUND') html = `<span style="color:#fb923c;font-weight:bold;">GROUND</span>`;
                else if (typeof plane.alt === 'number') html = plane.alt.toLocaleString() + ' ft';
                else if (plane.alt && plane.alt !== '----') html = plane.alt + ' ft';
                return { html };
            }
            case 'target_alt':
                return { html: (plane.target_alt && plane.target_alt !== '----') ? plane.target_alt : EM, cls: 'intent' };
            case 'vert_rate': {
                if (typeof plane.vert_rate !== 'number') return { html: EM };
                const c = plane.vert_rate > 250 ? '#4ade80' : (plane.vert_rate < -250 ? '#fb923c' : '#94a3b8');
                return { html: `<span style="color:${c};font-weight:bold;">${plane.vert_rate > 0 ? '+' : ''}${plane.vert_rate} ft/min</span>` };
            }
            case 'speed':
                return { html: (plane.speed && plane.speed !== '----') ? plane.speed + ' kt' : EM };
            case 'tas':
                return { html: (plane.tas && plane.tas !== '----') ? plane.tas + ' kt' : EM };
            case 'ias_mach': {
                const parts = [];
                if (typeof plane.ias === 'number') parts.push(`${plane.ias} kt`);
                if (typeof plane.mach === 'number') parts.push(`M${plane.mach.toFixed(3)}`);
                return { html: parts.length ? parts.join(' / ') : EM };
            }
            case 'ias':
                return { html: (typeof plane.ias === 'number') ? plane.ias + ' kt' : EM };
            case 'mach':
                return { html: (typeof plane.mach === 'number') ? 'M' + plane.mach.toFixed(3) : EM };
            case 'heading':
                return { html: null, special: 'heading' };
            case 'display_heading':
                return { html: null, special: 'heading' };
            case 'track_info': {
                const parts = [];
                if (typeof plane.track === 'number') parts.push(`${plane.track}°`);
                if (typeof plane.track_rate === 'number') {
                    parts.push(`<span style="color:#c084fc;">(${plane.track_rate > 0 ? '+' : ''}${plane.track_rate}°/s)</span>`);
                }
                return { html: parts.length ? parts.join(' ') : EM };
            }
            case 'track':
                return { html: (typeof plane.track === 'number') ? `${plane.track}°` : EM };
            case 'track_rate':
                return { html: (typeof plane.track_rate === 'number') ? `${plane.track_rate > 0 ? '+' : ''}${plane.track_rate}°/s` : EM };
            case 'roll':
                return { html: null, special: 'roll' };
            case 'sys_mode': {
                const cap = (plane.capability_summary && plane.capability_summary !== '----') ? plane.capability_summary : '';
                const bds = (plane.last_bds_hit && plane.last_bds_hit !== '----') ? plane.last_bds_hit : '';
                let parts = [];
                if (plane.discretes && plane.discretes !== '----') parts.push(plane.discretes);
                if (cap) parts.push(cap);
                let html = parts.length ? parts.join(' | ') : EM;
                if (bds) {
                    const prefix = html === EM ? '' : `${html}<br>`;
                    html = `${prefix}<span class="decode-tag">${bds}</span>`;
                }
                return { html, cls: 'discrete-cell' };
            }
            case 'baro':
                return { html: (plane.baro && plane.baro !== '----') ? plane.baro : EM, cls: 'baro-cell' };
            case 'discretes':
                return { html: (plane.discretes && plane.discretes !== '----') ? plane.discretes : EM, cls: 'discrete-cell' };
            case 'capability_summary':
                return { html: (plane.capability_summary && plane.capability_summary !== '----') ? plane.capability_summary : EM };
            case 'last_bds_hit':
                return { html: (plane.last_bds_hit && plane.last_bds_hit !== '----') ? `<span class="decode-tag">${plane.last_bds_hit}</span>` : EM };
            case 'supported_bds':
                return { html: (Array.isArray(plane.supported_bds) && plane.supported_bds.length) ? plane.supported_bds.join(', ') : EM };
            case 'tcas_ra': {
                const hasRa = !!(plane.tcas_ra && plane.tcas_ra !== '----' && plane.tcas_ra !== 'CLEAN');
                return { html: plane.tcas_ra || EM, cls: hasRa ? 'status-ra' : 'status-clean' };
            }
            case 'hazard':
                return { html: (plane.hazard && plane.hazard !== '----') ? `<span style="color:#ef4444;font-weight:bold;animation:text-flash 0.5s infinite alternate;">${plane.hazard}</span>` : EM };
            case 'radar_sweep':
                return { html: (plane.radar_sweep && plane.radar_sweep !== '----') ? plane.radar_sweep : EM, cls: 'radar-cell' };
            case 'gnss_qual':
                return { html: (plane.gnss_qual && plane.gnss_qual !== '----') ? plane.gnss_qual : EM, cls: 'gnss-cell' };
            case 'latlon': {
                if (plane.lat !== '----' && plane.lon !== '----' && typeof plane.lat === 'number') {
                    return { html: `${plane.lat.toFixed(4)}, ${plane.lon.toFixed(4)}`, cls: 'cpr-cell' };
                }
                return { html: EM };
            }
            case 'lat':
                return { html: (typeof plane.lat === 'number') ? plane.lat.toFixed(4) : EM };
            case 'lon':
                return { html: (typeof plane.lon === 'number') ? plane.lon.toFixed(4) : EM };
            case 'meteo': {
                if (plane.hazard && plane.hazard !== '----') {
                    return { html: `<span style="color:#ef4444;font-weight:bold;animation:text-flash 0.5s infinite alternate;">${plane.hazard}</span>`, cls: 'sensor-cell' };
                }
                const parts = [];
                if (plane.wind && plane.wind !== '----') parts.push(`W:${plane.wind}`);
                if (plane.sat && plane.sat !== '----') parts.push(`T:${plane.sat}`);
                return { html: parts.length ? parts.join(' | ') : EM, cls: 'sensor-cell' };
            }
            case 'wind':
                return { html: (plane.wind && plane.wind !== '----') ? plane.wind : EM };
            case 'sat':
                return { html: (plane.sat && plane.sat !== '----') ? plane.sat : EM };
            case 'meteo_source':
                return { html: (plane.meteo_source && plane.meteo_source !== '----') ? plane.meteo_source : EM };
            case 'age': {
                const color = plane.age > 45 ? '#f87171' : '#e2e8f0';
                return { html: plane.age + 's', style: `color:${color}` };
            }
            // --- Extended integrity / accuracy (BDS 6,2 / TC29) ---
            case 'selected_heading':
                return { html: (typeof plane.selected_heading === 'number') ? `${Math.round(plane.selected_heading)}°` : EM, cls: 'intent' };
            case 'selected_alt_source':
                return { html: (plane.selected_alt_source && plane.selected_alt_source !== '----') ? plane.selected_alt_source : EM };
            case 'autopilot_mode':
            case 'vnav_mode':
            case 'alt_hold_mode':
            case 'approach_mode':
            case 'lnav_mode':
            case 'tcas_operational':
                return { html: (plane[key] && plane[key] !== '----') ? plane[key] : EM };
            case 'nac_p':
                return { html: (plane.nac_p !== null && plane.nac_p !== undefined && plane.nac_p !== '----') ? `NACp:${plane.nac_p}` : EM };
            case 'sil':
                return { html: (plane.sil !== null && plane.sil !== undefined && plane.sil !== '----') ? `SIL:${plane.sil}` : EM };
            case 'nic_baro':
                return { html: (plane.nic_baro !== null && plane.nic_baro !== undefined && plane.nic_baro !== '----') ? (plane.nic_baro ? 'BARO✓' : 'BARO✗') : EM };
            // --- Extended altitude: radio altimeter (BDS 4,5) ---
            case 'radio_height':
                return { html: (typeof plane.radio_height === 'number') ? `${plane.radio_height} ft` : EM };
            // --- Extended meteorology: humidity (BDS 4,4) ---
            case 'humidity':
                return { html: (typeof plane.humidity === 'number') ? `${plane.humidity.toFixed(1)}%` : EM, cls: 'sensor-cell' };
            // --- Extended kinematics: inertial vertical rate (BDS 6,0) ---
            case 'inertial_vr': {
                if (typeof plane.inertial_vr !== 'number') return { html: EM };
                const c = plane.inertial_vr > 250 ? '#4ade80' : (plane.inertial_vr < -250 ? '#fb923c' : '#94a3b8');
                return { html: `<span style="color:${c};">${plane.inertial_vr > 0 ? '+' : ''}${plane.inertial_vr} ft/min</span>` };
            }
            // --- System timing: first-seen timestamp ---
            case 'first_seen':
                return { html: (plane.first_seen && plane.first_seen !== '----') ? plane.first_seen : EM };
            // --- Deep fields (generic number rendering) ---
            case 'vert_rate_baro':
            case 'vert_rate_inertial':
            case 'alt_mcp':
            case 'alt_fms':
            case 'wind_speed':
            case 'wind_direction':
            case 'static_pressure':
            case 'turbulence_level':
            case 'msg_count':
            case 'data_age_heading':
            case 'data_age_position': {
                const v = plane[key];
                if (v === '----' || v === null || v === undefined) return { html: EM };
                return { html: String(v) };
            }
            case 'wind_shear_level':
            case 'microburst_level':
            case 'icing_level':
            case 'wake_vortex_level': {
                const v = plane[key];
                if (v === '----' || v === null || v === undefined) return { html: EM };
                return { html: HAZARD_LEVEL_LABELS[v] !== undefined ? HAZARD_LEVEL_LABELS[v] : String(v) };
            }
            case 'threat_icao':
                return { html: (plane.threat_icao && plane.threat_icao !== '----') ? plane.threat_icao : EM };
            case 'threat_range_nm':
                return { html: (typeof plane.threat_range_nm === 'number') ? `${plane.threat_range_nm.toFixed(1)} NM` : EM };
            case 'threat_bearing_deg':
                return { html: (typeof plane.threat_bearing_deg === 'number') ? `${plane.threat_bearing_deg}°` : EM };
            case 'rssi_dbfs':
                return { html: (typeof plane.rssi_dbfs === 'number') ? `${plane.rssi_dbfs.toFixed(1)} dBFS` : EM };
            case 'display_heading_source':
                return { html: (plane.display_heading_source && plane.display_heading_source !== 'none') ? `<span style="color:#a78bfa;">${plane.display_heading_source}</span>` : EM };
            // --- FMS Intent (BDS 4,1 / 4,2 / 4,3) ---
            case 'intent_next_wp':
                return { html: (plane.intent_next_wp && plane.intent_next_wp !== '----') ? plane.intent_next_wp : EM, cls: 'intent' };
            case 'intent_wp_lat':
                return { html: (typeof plane.intent_wp_lat === 'number') ? `${plane.intent_wp_lat.toFixed(5)}°` : EM, cls: 'intent' };
            case 'intent_wp_lon':
                return { html: (typeof plane.intent_wp_lon === 'number') ? `${plane.intent_wp_lon.toFixed(5)}°` : EM, cls: 'intent' };
            case 'intent_wp_cross_alt':
                return { html: (typeof plane.intent_wp_cross_alt === 'number') ? `${plane.intent_wp_cross_alt} ft` : EM, cls: 'intent' };
            case 'intent_bearing':
                return { html: (typeof plane.intent_bearing === 'number') ? `${plane.intent_bearing.toFixed(2)}°` : EM, cls: 'intent' };
            case 'intent_time_to_go':
                return { html: (typeof plane.intent_time_to_go === 'number') ? `${plane.intent_time_to_go.toFixed(1)} min` : EM, cls: 'intent' };
            case 'intent_dist_to_go':
                return { html: (typeof plane.intent_dist_to_go === 'number') ? `${plane.intent_dist_to_go.toFixed(1)} NM` : EM, cls: 'intent' };
            // --- VHF Comms (BDS 4,8) ---
            case 'vhf1_freq_mhz':
                return { html: (typeof plane.vhf1_freq_mhz === 'number') ? `${plane.vhf1_freq_mhz.toFixed(3)} MHz` : EM };
            case 'vhf2_freq_mhz':
                return { html: (typeof plane.vhf2_freq_mhz === 'number') ? `${plane.vhf2_freq_mhz.toFixed(3)} MHz` : EM };
            case 'vhf3_freq_mhz':
                return { html: (typeof plane.vhf3_freq_mhz === 'number') ? `${plane.vhf3_freq_mhz.toFixed(3)} MHz` : EM };
            case 'vhf1_audio':
            case 'vhf2_audio':
            case 'vhf3_audio':
            case 'vhf_guard_audio':
                return { html: (plane[key] && plane[key] !== '----') ? plane[key] : EM };
            // --- Air-Referenced Vector (BDS 5,3) ---
            case 'air_vector_heading':
                return { html: (typeof plane.air_vector_heading === 'number') ? `${plane.air_vector_heading.toFixed(2)}°` : EM };
            case 'air_vector_ias':
                return { html: (typeof plane.air_vector_ias === 'number') ? `${plane.air_vector_ias} kt` : EM };
            case 'air_vector_mach':
                return { html: (typeof plane.air_vector_mach === 'number') ? `M${plane.air_vector_mach.toFixed(3)}` : EM };
            case 'air_vector_tas':
                return { html: (typeof plane.air_vector_tas === 'number') ? `${plane.air_vector_tas} kt` : EM };
            case 'air_vector_vr':
                return { html: (typeof plane.air_vector_vr === 'number') ? `${plane.air_vector_vr > 0 ? '+' : ''}${plane.air_vector_vr} fpm` : EM };
            // --- Quasi-Static Parameters (BDS 5,F) ---
            case 'qsp_mcp_alt_change':
            case 'qsp_next_wp_change':
            case 'qsp_fms_vmode_change':
            case 'qsp_vhf_change':
            case 'qsp_meteo_change':
            case 'qsp_fms_alt_change':
            case 'qsp_baro_change': {
                const v = plane[key];
                if (v === '----' || v === null || v === undefined) return { html: EM };
                return { html: String(v) };
            }
            default:
                return { html: EM };
        }
    }

    // ============================================================
    // ROW MANAGEMENT (per-aircraft heading/roll animation state)
    // ============================================================
    const planeState = {};

    function initHeadingWidget() {
        return `<div class="instrument-wrapper"><div class="dial-core hdg-dial"><div class="pointer-container hdg-pointer"></div></div><span class="val-text"></span></div>`;
    }
    function initRollWidget() {
        return `<div class="instrument-wrapper"><div class="dial-core bank-dial"><div class="pointer-container bank-pointer"></div></div><span class="val-text"></span></div>`;
    }

    function createRow(icao) {
        const row = document.createElement('tr');
        row.id = 'row-' + icao;
        activeConfig.columns.forEach(key => {
            const td = document.createElement('td');
            td.dataset.field = key;
            if (key === 'heading' || key === 'display_heading') td.innerHTML = initHeadingWidget();
            else if (key === 'roll') td.innerHTML = initRollWidget();
            row.appendChild(td);
        });
        planeState[icao] = { hdg: 0, roll: 0, firstPing: true };
        return row;
    }

    function updateRow(plane) {
        const tableBody = document.getElementById('aircraft-table-body');
        let row = document.getElementById('row-' + plane.icao);
        const numCols = activeConfig.columns.length;

        if (!row) {
            row = createRow(plane.icao);
            tableBody.appendChild(row);
        } else if (row.cells.length !== numCols) {
            // Column config changed — rebuild this row's cells
            while (row.firstChild) row.removeChild(row.firstChild);
            activeConfig.columns.forEach(key => {
                const td = document.createElement('td');
                td.dataset.field = key;
                if (key === 'heading' || key === 'display_heading') td.innerHTML = initHeadingWidget();
                else if (key === 'roll') td.innerHTML = initRollWidget();
                row.appendChild(td);
            });
            if (!planeState[plane.icao]) planeState[plane.icao] = { hdg: 0, roll: 0, firstPing: true };
        }

        // Emergency / IDENT row classes
        const hasRa = !!(plane.tcas_ra && plane.tcas_ra !== '----' && plane.tcas_ra !== 'CLEAN');
        let rowClass = '';
        if (['7500','7600','7700'].includes(plane.squawk) || hasRa) rowClass = 'row-emergency';
        row.className = rowClass;
        if (plane.is_coasting) row.classList.add('row-coasting');

        // Update each cell via renderer
        activeConfig.columns.forEach(key => {
            const td = row.querySelector(`[data-field="${key}"]`);
            if (!td) return;
            const r = renderCell(key, plane);
            if (r.special === 'heading') {
                updateHeadingWidget(td, plane);
            } else if (r.special === 'roll') {
                updateRollWidget(td, plane);
            } else {
                td.innerHTML = r.html;
                td.className = r.cls || '';
                if (r.style) td.style.cssText = r.style;
                else td.style.cssText = '';
            }
        });
    }

    function updateHeadingWidget(td, plane) {
        if (!planeState[plane.icao]) planeState[plane.icao] = { hdg: 0, roll: 0, firstPing: true };
        const state = planeState[plane.icao];
        // Use canonical display_heading when available, fall back to raw heading
        const hdgValue = (plane.display_heading !== '----' && plane.display_heading !== null && plane.display_heading !== undefined) 
            ? plane.display_heading 
            : plane.heading;
        const hasHdg = (hdgValue !== '----' && hdgValue !== null && hdgValue !== undefined);

        if (hasHdg) {
            const targetHdg = parseFloat(hdgValue);
            if (state.firstPing) {
                state.hdg = targetHdg;
            } else {
                let diff = targetHdg - (state.hdg % 360);
                if (diff > 180) diff -= 360;
                else if (diff < -180) diff += 360;
                state.hdg += diff;
            }
            state.hdg = ((state.hdg % 360) + 360) % 360;
        }

        const wrapper = td.querySelector('.instrument-wrapper');
        if (wrapper) wrapper.style.opacity = hasHdg ? '1' : '0.3';
        const ptr = td.querySelector('.hdg-pointer');
        if (ptr) ptr.style.transform = `rotate(${state.hdg}deg)`;
        const txt = td.querySelector('.val-text');
        if (txt) txt.innerHTML = hasHdg ? `${plane.heading}°` : EM;
    }

    function updateRollWidget(td, plane) {
        if (!planeState[plane.icao]) planeState[plane.icao] = { hdg: 0, roll: 0, firstPing: true };
        const state = planeState[plane.icao];
        const hasRoll = (plane.roll !== '----' && plane.roll !== null && plane.roll !== undefined);
        if (hasRoll) state.roll = parseFloat(plane.roll);

        const wrapper = td.querySelector('.instrument-wrapper');
        if (wrapper) wrapper.style.opacity = hasRoll ? '1' : '0.3';
        const ptr = td.querySelector('.bank-pointer');
        const disp = Math.max(-30, Math.min(30, state.roll));
        if (ptr) ptr.style.transform = `rotate(${disp * 1.5}deg)`;
        const txt = td.querySelector('.val-text');
        if (txt) txt.innerHTML = hasRoll ? `${Math.round(disp)}°` : EM;
    }

    // ============================================================
    // TABLE UPDATE (called on every WebSocket message)
    // ============================================================

    function updateTable(aircraftList) {
        const tableBody = document.getElementById('aircraft-table-body');

        if (aircraftList.length > 0) {
            const coldStart = document.getElementById('cold-start-row');
            if (coldStart) coldStart.remove();
        }

        // Sort if configured
        let sorted = [...aircraftList];
        if (activeConfig.sortKey) {
            const sk = activeConfig.sortKey;
            const dir = activeConfig.sortDir === 'desc' ? -1 : 1;
            sorted.sort((a, b) => {
                const va = a[sk], vb = b[sk];
                // Empty/null values always sort to the bottom regardless of direction,
                // keeping known data visible at the top in both asc and desc modes.
                if (isEmptyValue(va) && isEmptyValue(vb)) return 0;
                if (isEmptyValue(va)) return 1;
                if (isEmptyValue(vb)) return -1;
                if (typeof va === 'number' && typeof vb === 'number') return dir * (va - vb);
                return dir * String(va).localeCompare(String(vb));
            });
        }

        // Update/create rows
        const activeIcaos = new Set();
        sorted.forEach(plane => {
            if (!plane || !plane.icao) return;
            activeIcaos.add(plane.icao);
            updateRow(plane);
        });

        // Reorder DOM to match sort
        if (activeConfig.sortKey) {
            sorted.forEach(plane => {
                if (!plane || !plane.icao) return;
                const row = document.getElementById('row-' + plane.icao);
                if (row) tableBody.appendChild(row);
            });
        }

        // Finalise per-aircraft state flags
        sorted.forEach(plane => {
            if (!plane || !plane.icao) return;
            if (planeState[plane.icao]) planeState[plane.icao].firstPing = false;
        });

        // Remove stale rows
        Array.from(tableBody.children).forEach(row => {
            if (row.id === 'cold-start-row') return;
            const icao = row.id.replace('row-', '');
            if (!activeIcaos.has(icao)) {
                row.remove();
                delete planeState[icao];
            }
        });

        if (aircraftList.length === 0 && !document.getElementById('cold-start-row')) {
            tableBody.innerHTML = `<tr id="cold-start-row"><td colspan="${activeConfig.columns.length}" style="text-align:center;color:#94a3b8;">No tracked emitters within radar aperture range.</td></tr>`;
        }
    }

    // ============================================================
    // WEBSOCKET
    // ============================================================
    // --- DATA PIPELINE & TIMEOUT / "GREY" MODEL ---
    //
    // PIPELINE (ingest → frontend):
    //   1. ADSBee 1090 feeds Beast-raw frames over serial at ~115200 baud.
    //   2. serial_reader_thread() parses Beast frames and calls process_frame().
    //   3. process_frame() decodes the ADS-B/Mode-S payload via pyModeS/bare-metal
    //      CPR math and updates aircraft_state[icao] fields immediately (no buffering).
    //   4. broadcast_state() (WebSocket coroutine) wakes every 1 second, snapshots
    //      aircraft_state under state_lock, annotates age/is_coasting, and sends the
    //      full airframes array to all connected clients.
    //   5. Frontend ws.onmessage() receives the snapshot and calls updateTable(),
    //      which diffs and repaints only changed cells to avoid layout thrash.
    //
    // STALENESS / "GREY" BEHAVIOUR:
    //   - Each aircraft track has a "coast threshold":
    //       coast_threshold = max(5.0 s, min(raw_sweep_interval + 2.5 s, 15.0 s))
    //     where raw_sweep_interval is the measured SSR radar sweep period.
    //     Default (unknown sweep): coast_threshold = 5.0 s.
    //   - When age > coast_threshold, is_coasting = true → the row gets
    //     the .row-coasting class (opacity: 0.35, CSS transition 2.5 s).
    //   - Individual fields do NOT have per-field staleness: each field retains
    //     its last decoded value until a new decode updates it. The whole row dims.
    //   - After 60 s of silence a farewell event is logged and the row stays
    //     greyed. After a further ~4 s reaper tick the track is deleted entirely.
    //
    // LATENCY:
    //   - Hot path (serial → aircraft_state update) is synchronous & sub-millisecond.
    //   - Frontend receives a fresh snapshot every 1 second from the backend.
    //   - No debouncing or batching is applied; each WS message triggers one render pass.
    // ============================================================
    const tableBody = document.getElementById('aircraft-table-body');
    const statusText = document.getElementById('status-text');
    const ledgerCountVal = document.getElementById('ledger-count-val');

    const ws = new WebSocket('ws://localhost:8765');
    ws.onopen = () => { statusText.innerText = 'ONLINE - STREAMING RAMPED'; statusText.className = 'online'; };
    ws.onclose = () => { statusText.innerText = 'OFFLINE - CONSOLE DETACHED'; statusText.className = 'offline'; };

    ws.onmessage = (event) => {
        try {
            const parsedData = JSON.parse(event.data);

            let aircraftList = [];
            if (Array.isArray(parsedData)) {
                aircraftList = parsedData;
            } else {
                aircraftList = parsedData.airframes || [];
                if (parsedData.meta && parsedData.meta.ledger_count !== undefined) {
                    if (ledgerCountVal) ledgerCountVal.innerText = parsedData.meta.ledger_count.toLocaleString();
                }
            }

            // Update grid
            updateTable(aircraftList);

        } catch(err) {
            console.warn('[DART-B] Failed to process WebSocket message:', err);
        }
    };

    // ============================================================
    // COLUMN MANAGER — drag-and-drop reorder, toggle visibility
    // ============================================================

    let dragSrcKey = null;

    // Cached DOM references for the column manager overlay
    const colMgrOverlay = document.getElementById('col-mgr-overlay');

    function openColumnManager() {
        // Clone active config into working copy
        tempConfig = JSON.parse(JSON.stringify(activeConfig));
        renderActiveColList();
        renderAvailableColList('');
        populateSortSelect();
        document.getElementById('col-search').value = '';
        colMgrOverlay.classList.add('open');
    }

    function closeColumnManager() {
        colMgrOverlay.classList.remove('open');
        tempConfig = null;
    }

    // Wire up static UI button event listeners (no inline onclick in HTML)
    document.getElementById('open-col-mgr-btn').addEventListener('click', openColumnManager);
    document.getElementById('close-col-mgr-btn').addEventListener('click', closeColumnManager);
    document.getElementById('sort-dir-btn').addEventListener('click', toggleSortDir);
    document.getElementById('reset-widths-btn').addEventListener('click', resetColumnWidths);
    document.getElementById('reset-config-btn').addEventListener('click', resetConfig);
    document.getElementById('apply-config-btn').addEventListener('click', applyConfig);
    document.getElementById('col-search').addEventListener('input', (e) => filterAvailableFields(e.target.value));

    // Close on overlay background click (compare against cached reference)
    colMgrOverlay.addEventListener('click', (e) => {
        if (e.target === colMgrOverlay) closeColumnManager();
    });

    // ESC key closes
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeColumnManager();
    });

    function renderActiveColList() {
        const ul = document.getElementById('active-col-list');
        ul.innerHTML = '';
        tempConfig.columns.forEach((key, idx) => {
            const def = FIELD_MAP[key];
            const li = document.createElement('li');
            li.className = 'active-col-item';
            li.draggable = true;
            li.dataset.key = key;
            li.dataset.idx = idx;

            // Build inner elements without inline onclick to avoid XSS concerns
            const dragSpan = document.createElement('span');
            dragSpan.className = 'drag-handle';
            dragSpan.title = 'Drag to reorder';
            dragSpan.textContent = '⠿';

            const labelSpan = document.createElement('span');
            labelSpan.className = 'col-item-label';
            labelSpan.textContent = def ? def.label : key;

            const catSpan = document.createElement('span');
            catSpan.className = 'col-item-cat';
            catSpan.textContent = def ? def.category : '';

            const upBtn = document.createElement('button');
            upBtn.className = 'col-item-btn up-btn';
            upBtn.title = 'Move up';
            upBtn.textContent = '▲';
            upBtn.disabled = (idx === 0);
            upBtn.addEventListener('click', () => moveCol(idx, -1));

            const dnBtn = document.createElement('button');
            dnBtn.className = 'col-item-btn dn-btn';
            dnBtn.title = 'Move down';
            dnBtn.textContent = '▼';
            dnBtn.disabled = (idx === tempConfig.columns.length - 1);
            dnBtn.addEventListener('click', () => moveCol(idx, 1));

            const rmBtn = document.createElement('button');
            rmBtn.className = 'col-item-btn danger';
            rmBtn.title = 'Remove column';
            rmBtn.textContent = '✕';
            rmBtn.addEventListener('click', () => removeCol(key));

            li.appendChild(dragSpan);
            li.appendChild(labelSpan);
            li.appendChild(catSpan);
            li.appendChild(upBtn);
            li.appendChild(dnBtn);
            li.appendChild(rmBtn);

            // Drag-and-drop events
            li.addEventListener('dragstart', (e) => {
                dragSrcKey = key;
                e.dataTransfer.effectAllowed = 'move';
                li.style.opacity = '0.5';
            });
            li.addEventListener('dragend', () => {
                li.style.opacity = '1';
                ul.querySelectorAll('.active-col-item').forEach(el => el.classList.remove('drag-over'));
            });
            li.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                ul.querySelectorAll('.active-col-item').forEach(el => el.classList.remove('drag-over'));
                li.classList.add('drag-over');
            });
            li.addEventListener('drop', (e) => {
                e.preventDefault();
                if (dragSrcKey && dragSrcKey !== key) {
                    const srcIdx = tempConfig.columns.indexOf(dragSrcKey);
                    const dstIdx = tempConfig.columns.indexOf(key);
                    if (srcIdx !== -1 && dstIdx !== -1) {
                        tempConfig.columns.splice(srcIdx, 1);
                        tempConfig.columns.splice(dstIdx, 0, dragSrcKey);
                        renderActiveColList();
                        renderAvailableColList(document.getElementById('col-search').value);
                    }
                }
                dragSrcKey = null;
            });

            ul.appendChild(li);
        });
    }

    function moveCol(idx, dir) {
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= tempConfig.columns.length) return;
        const tmp = tempConfig.columns[idx];
        tempConfig.columns[idx] = tempConfig.columns[newIdx];
        tempConfig.columns[newIdx] = tmp;
        renderActiveColList();
    }

    function removeCol(key) {
        tempConfig.columns = tempConfig.columns.filter(k => k !== key);
        renderActiveColList();
        renderAvailableColList(document.getElementById('col-search').value);
    }

    function addCol(key) {
        if (!tempConfig.columns.includes(key)) {
            tempConfig.columns.push(key);
            renderActiveColList();
            renderAvailableColList(document.getElementById('col-search').value);
        }
    }

    function renderAvailableColList(filter) {
        const container = document.getElementById('avail-col-list');
        container.innerHTML = '';

        const fl = filter.toLowerCase().trim();

        // Group fields by category
        const categories = {};
        FIELD_DEFS.forEach(def => {
            if (fl && !def.label.toLowerCase().includes(fl) && !def.category.toLowerCase().includes(fl) && !def.key.toLowerCase().includes(fl)) return;
            if (!categories[def.category]) categories[def.category] = [];
            categories[def.category].push(def);
        });

        Object.entries(categories).forEach(([cat, defs]) => {
            const group = document.createElement('div');
            group.className = 'avail-cat-group';

            const catLabel = document.createElement('div');
            catLabel.className = 'avail-cat-label';
            catLabel.textContent = cat;
            group.appendChild(catLabel);

            defs.forEach(def => {
                const isActive = tempConfig.columns.includes(def.key);
                const item = document.createElement('div');
                item.className = 'avail-col-item' + (isActive ? '' : ' hidden-field');

                // Toggle checkbox — use addEventListener instead of inline onclick
                const toggle = document.createElement('div');
                toggle.className = 'field-toggle' + (isActive ? ' active' : '');
                toggle.title = isActive ? 'Hide column' : 'Show column';
                toggle.textContent = isActive ? '✓' : '';
                toggle.addEventListener('click', () => toggleField(def.key));

                // Use shared formatLabelWithUnit helper for consistency with table headers
                const labelSpan = document.createElement('span');
                labelSpan.className = 'avail-field-label';
                labelSpan.textContent = formatLabelWithUnit(def.label, def.unit);

                const srcSpan = document.createElement('span');
                srcSpan.className = 'avail-field-src';
                srcSpan.textContent = def.source;

                item.appendChild(toggle);
                item.appendChild(labelSpan);
                item.appendChild(srcSpan);
                group.appendChild(item);
            });

            container.appendChild(group);
        });
    }

    function toggleField(key) {
        if (tempConfig.columns.includes(key)) {
            removeCol(key);
        } else {
            addCol(key);
        }
    }

    function filterAvailableFields(value) {
        renderAvailableColList(value);
    }

    function populateSortSelect() {
        const sel = document.getElementById('sort-key-select');
        sel.innerHTML = '<option value="">— none —</option>';
        FIELD_DEFS.filter(f => f.sortable).forEach(def => {
            const opt = document.createElement('option');
            opt.value = def.key;
            opt.textContent = def.label;
            if (tempConfig.sortKey === def.key) opt.selected = true;
            sel.appendChild(opt);
        });
        const dirBtn = document.getElementById('sort-dir-btn');
        dirBtn.textContent = (tempConfig.sortDir === 'desc') ? '▼ DESC' : '▲ ASC';
    }

    function toggleSortDir() {
        tempConfig.sortDir = (tempConfig.sortDir === 'asc') ? 'desc' : 'asc';
        const btn = document.getElementById('sort-dir-btn');
        btn.textContent = (tempConfig.sortDir === 'desc') ? '▼ DESC' : '▲ ASC';
    }

    function resetConfig() {
        tempConfig = getDefaultConfig();
        renderActiveColList();
        renderAvailableColList(document.getElementById('col-search').value);
        populateSortSelect();
    }

    function applyConfig() {
        // Read sort key from select
        const sk = document.getElementById('sort-key-select').value;
        tempConfig.sortKey = sk || null;

        activeConfig = JSON.parse(JSON.stringify(tempConfig));
        saveConfig(activeConfig);

        // Rebuild table header and clear rows (repopulated on next WS tick)
        rebuildTableHeader();
        const tb = document.getElementById('aircraft-table-body');
        tb.innerHTML = `<tr id="cold-start-row"><td colspan="${activeConfig.columns.length}" style="text-align:center;color:#94a3b8;">Applying new layout...</td></tr>`;
        // Clear planeState so instrument widgets reinitialise
        Object.keys(planeState).forEach(k => delete planeState[k]);

        closeColumnManager();
    }

    // ============================================================
    // COLUMN RESIZE — draggable resize handles on header cells
    // Widths are persisted in activeConfig.columnWidths (localStorage).
    // ============================================================
    const MIN_COLUMN_WIDTH = 40; // px — smallest a column can be dragged to
    let _colResizing = false;  // true while a drag is in progress
    let _colKey = null;        // key of column being resized
    let _colStartX = 0;        // mouse X at drag start
    let _colStartW = 0;        // column width at drag start (px)
    let _colCurW = 0;          // live width during drag

    document.addEventListener('mousemove', (e) => {
        if (!_colResizing) return;
        const delta = e.clientX - _colStartX;
        _colCurW = Math.max(MIN_COLUMN_WIDTH, Math.round(_colStartW + delta));
        // Apply width live to the header th for instant feedback
        const th = document.querySelector(`th.header-cell[data-key="${_colKey}"]`);
        if (th) {
            th.style.width = _colCurW + 'px';
            th.style.minWidth = _colCurW + 'px';
        }
        // Keep origin-row cell aligned
        const srcThs = document.querySelectorAll(`th.origin-cell`);
        const hdrThs = document.querySelectorAll(`th.header-cell`);
        hdrThs.forEach((hth, i) => {
            if (hth.dataset.key === _colKey && srcThs[i]) {
                srcThs[i].style.minWidth = _colCurW + 'px';
            }
        });
    });

    document.addEventListener('mouseup', () => {
        if (!_colResizing) return;
        _colResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.querySelectorAll('.resize-handle.col-resizing').forEach(h => h.classList.remove('col-resizing'));
        if (_colKey && _colCurW > 0) {
            if (!activeConfig.columnWidths) activeConfig.columnWidths = {};
            activeConfig.columnWidths[_colKey] = _colCurW;
            saveConfig(activeConfig);
        }
        _colKey = null;
        _colCurW = 0;
    });

    /**
     * Clears all manually-set column widths and reverts to content-aware defaults.
     * Can be triggered from the column manager or called programmatically.
     */
    function resetColumnWidths() {
        activeConfig.columnWidths = {};
        saveConfig(activeConfig);
        rebuildTableHeader();
    }

    // ============================================================
    // INITIALISATION
    // ============================================================
    rebuildTableHeader();
    </script>
</body>
</html>
